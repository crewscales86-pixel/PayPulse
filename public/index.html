<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayPulse — Pay Per Appointment Billing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07110d;
    --bg2: #0d1713;
    --surface: rgba(12, 21, 17, 0.82);
    --surface2: rgba(17, 31, 25, 0.88);
    --surface3: rgba(26, 43, 35, 0.92);
    --surface4: rgba(14, 24, 20, 0.96);
    --border: rgba(130, 164, 146, 0.16);
    --border-strong: rgba(82, 255, 177, 0.28);
    --text: #eef7f1;
    --text2: #9eb4a7;
    --text3: #6e8479;
    --accent: #2af598;
    --accent2: #1adf88;
    --accent-soft: rgba(42, 245, 152, 0.14);
    --danger: #ff6a6a;
    --warn: #ffbf5f;
    --blue: #59b7ff;
    --purple: #a791ff;
    --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
    --glow: 0 0 0 1px rgba(42, 245, 152, 0.08), 0 18px 45px rgba(0, 0, 0, 0.22);
  }
  html {
    background:
      radial-gradient(circle at top left, rgba(42,245,152,0.14), transparent 30%),
      radial-gradient(circle at top right, rgba(89,183,255,0.10), transparent 24%),
      linear-gradient(180deg, #08120e 0%, #06100c 44%, #050908 100%);
  }
  body {
    background:
      radial-gradient(circle at 10% 0%, rgba(42,245,152,0.08), transparent 28%),
      radial-gradient(circle at 90% 12%, rgba(89,183,255,0.07), transparent 24%),
      linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
      var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    overflow-x: hidden;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: linear-gradient(180deg, rgba(255,255,255,0.55), transparent 85%);
    pointer-events: none;
    opacity: 0.22;
  }
  #root { min-height: 100vh; position: relative; }
  a { color: var(--accent); text-decoration: none; }
  button { cursor: pointer; font-family: inherit; border: none; outline: none; background: none; color: inherit; }
  input, select, textarea {
    background: rgba(15, 28, 22, 0.94);
    border: 1px solid rgba(140, 171, 155, 0.14);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    width: 100%;
    transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
  }
  textarea { resize: vertical; }
  input:focus, select:focus, textarea:focus {
    border-color: rgba(42, 245, 152, 0.44);
    box-shadow: 0 0 0 4px rgba(42, 245, 152, 0.08);
    outline: none;
  }
  ::placeholder { color: #62776c; }

  /* Auth */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 28px; }
  .auth-box {
    background: linear-gradient(180deg, rgba(17,31,25,0.94), rgba(11,19,16,0.98));
    border: 1px solid var(--border); border-radius: 26px;
    padding: 48px; width: 100%; max-width: 460px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(22px);
  }
  .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .auth-logo-icon {
    width: 46px; height: 46px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; color: #042312; font-size: 22px;
    background: linear-gradient(135deg, #76ffbf 0%, #2af598 58%, #16b96e 100%);
    box-shadow: 0 12px 28px rgba(42, 245, 152, 0.24);
  }
  .auth-logo-text { font-size: 28px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); font-family: 'Space Grotesk', sans-serif; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--surface2); color: var(--text2); }
  .auth-tab.active { background: var(--accent); color: #000; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
  .btn-primary {
    padding: 12px 20px;
    border-radius: 12px;
    background: linear-gradient(135deg, #61ffc0 0%, #28f598 55%, #18c97a 100%);
    color: #042311;
    font-weight: 800;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    box-shadow: 0 16px 28px rgba(22, 174, 105, 0.22);
    transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    width: 100%;
  }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.03); box-shadow: 0 18px 32px rgba(22, 174, 105, 0.28); }
  .btn-ghost {
    padding: 10px 18px;
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
    color: var(--text2);
    border: 1px solid rgba(154, 179, 166, 0.12);
    font-weight: 600;
  }
  .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }
  .success-msg { color: var(--accent); font-size: 13px; margin-top: 8px; }

  /* Nav */
  .nav {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 32px 14px; min-height: 84px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    background: linear-gradient(180deg, rgba(5,10,8,0.88), rgba(5,10,8,0.65));
    backdrop-filter: blur(20px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 700; letter-spacing: 0.03em; font-family: 'Space Grotesk', sans-serif; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #7effc5 0%, #2af598 55%, #18c97a 100%);
    border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #042311; font-size: 18px;
    box-shadow: 0 10px 24px rgba(42, 245, 152, 0.22);
  }
  .nav-link {
    padding: 10px 15px; border-radius: 999px; color: var(--text2); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; cursor: pointer; transition: 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-link:hover { color: var(--text); background: rgba(255,255,255,0.035); }
  .nav-link.active {
    color: var(--text);
    background: linear-gradient(180deg, rgba(42, 245, 152, 0.15), rgba(42, 245, 152, 0.08));
    border: 1px solid rgba(42, 245, 152, 0.18);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
  }
  .nav-spacer { flex: 1; }
  .inbox-btn {
    position: relative; padding: 10px 14px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); color: var(--text); font-size: 13px; display: flex; align-items: center; gap: 6px;
  }
  .badge {
    position: absolute; top: -4px; right: -4px; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }

  /* Page */
  .page { padding: 34px 32px 48px; max-width: 1440px; margin: 0 auto; }
  .page-title { font-size: 30px; font-weight: 700; margin-bottom: 24px; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.03em; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 18px; margin-bottom: 28px; }
  .stat-card {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0)),
      linear-gradient(180deg, rgba(11, 20, 16, 0.96), rgba(10, 17, 14, 0.92));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 22px 20px;
    box-shadow: var(--glow);
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    inset: 0 auto auto 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, rgba(42,245,152,0.7), rgba(89,183,255,0.4), transparent);
  }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); font-weight: 600; margin-bottom: 8px; }
  .stat-value { font-size: 38px; font-weight: 800; color: var(--accent); font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.04em; }
  .stat-value.red { color: var(--danger); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.yellow { color: var(--warn); }

  .filters { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-pill {
    padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    color: var(--text2); font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  .filter-pill.active {
    color: var(--text);
    border-color: rgba(42,245,152,0.28);
    background: linear-gradient(180deg, rgba(42,245,152,0.14), rgba(42,245,152,0.06));
  }
  .filter-pill .count { background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
  .search-box { width: 280px; }
  .filters .btn-primary { width: auto; min-width: 220px; }

  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .kanban-col {
    background: linear-gradient(180deg, rgba(13, 23, 19, 0.94), rgba(9, 15, 13, 0.92));
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 18px;
    min-height: 460px;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: var(--glow);
  }
  .kanban-col:hover { transform: translateY(-1px); }
  .kanban-col.drag-over { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(42,245,152,0.18), 0 18px 40px rgba(0,0,0,0.24); }
  .kanban-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.16em; }
  .kanban-col-header .dot { width: 8px; height: 8px; border-radius: 50%; }
  .kanban-col-header .count { margin-left: auto; background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 999px; font-size: 11px; }
  .kanban-sortable { min-height: 100px; }
  .kanban-col-empty { color:var(--text3); font-size:13px; text-align:center; padding:52px 10px; line-height:1.6; }

  .cust-card {
    background: linear-gradient(180deg, rgba(22, 38, 31, 0.96), rgba(15, 26, 22, 0.98));
    border: 1px solid rgba(133, 170, 151, 0.12); border-radius: 18px; padding: 16px;
    margin-bottom: 12px; transition: 0.15s; cursor: grab; position: relative;
  }
  .cust-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    border-radius: 18px 0 0 18px;
    background: linear-gradient(180deg, rgba(42,245,152,0.88), rgba(89,183,255,0.24));
    opacity: 0.8;
  }
  .cust-card:hover { border-color: rgba(42,245,152,0.26); transform: translateY(-2px); box-shadow: 0 10px 26px rgba(0,0,0,0.22); }
  .cust-card.sortable-chosen { border-color: var(--accent); box-shadow: 0 12px 28px rgba(0,200,83,0.15); transform: scale(1.02); }
  .cust-card.sortable-ghost { opacity: 0.4; border-style: dashed; }
  .cust-card.dragging { opacity: 0.45; transform: scale(0.98); }
  .customer-wrap.dragging .cust-card { opacity: 0.45; transform: scale(0.98); }
  .cust-card:active { cursor: grabbing; }
  .cust-name { font-weight: 800; font-size: 15px; margin-bottom: 3px; }
  .cust-rate { font-weight: 800; color: var(--blue); font-size: 14px; margin-bottom: 4px; }
  .cust-email { color: var(--text2); font-size: 12px; margin-bottom: 10px; }
  .cust-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; text-transform: uppercase;
  }
  .tag-green { background: rgba(42,245,152,0.12); color: var(--accent); }
  .tag-red { background: rgba(255,106,106,0.1); color: var(--danger); }
  .tag-blue { background: rgba(89,183,255,0.12); color: var(--blue); }
  .tag-purple { background: rgba(167,145,255,0.12); color: var(--purple); }
  .tag-yellow { background: rgba(255,209,102,0.12); color: var(--warn); }
  .cust-actions { display: flex; gap: 6px; }
  .btn-sm {
    padding: 7px 13px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em;
    background: rgba(255,255,255,0.04); color: var(--text); border: 1px solid rgba(255,255,255,0.06); transition: 0.15s;
  }
  .btn-sm:hover { background: rgba(255,255,255,0.08); }
  .btn-sm.green { background: rgba(42,245,152,0.12); color: var(--accent); border-color: rgba(42,245,152,0.22); }
  .btn-sm.green:hover { background: rgba(42,245,152,0.18); }
  .btn-sm.purple { background: rgba(167,145,255,0.12); color: var(--purple); border-color: rgba(167,145,255,0.22); }

  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .settings-card {
    background: linear-gradient(180deg, rgba(13, 23, 19, 0.95), rgba(10, 17, 14, 0.94)); border: 1px solid var(--border); border-radius: 22px; padding: 24px;
    box-shadow: var(--glow);
  }
  .settings-card h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); margin-bottom: 20px; }
  .processor-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
  .proc-tab {
    flex: 1; padding: 14px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-weight: 700; font-size: 13px; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .proc-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.05); }
  .webhook-box {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px; margin-top: 10px; word-break: break-all; font-family: monospace; font-size: 12px; color: var(--accent);
  }
  .webhook-box.blue { color: var(--blue); }
  .copy-btn {
    margin-top: 8px; padding: 6px 14px; border-radius: 6px; background: var(--surface3); color: var(--text2); font-size: 11px; font-weight: 600; border: 1px solid var(--border);
  }
  .toggle { width: 48px; height: 26px; border-radius: 13px; background: var(--surface3); border: 1px solid var(--border); position: relative; cursor: pointer; transition: 0.2s; }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: 0.2s; }
  .toggle.on::after { left: 24px; }

  .notif-list { max-width: 840px; margin: 0 auto; background: linear-gradient(180deg, rgba(13,23,19,0.96), rgba(9,16,13,0.96)); border: 1px solid var(--border); border-radius: 22px; overflow: hidden; box-shadow: var(--glow); }
  .notif-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .notif-header h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .notif-header .mark-read { font-size: 12px; color: var(--text2); cursor: pointer; }
  .notif-item { display: flex; align-items: flex-start; gap: 14px; padding: 16px 20px; border-bottom: 1px solid var(--border); transition: 0.1s; }
  .notif-item:hover { background: var(--surface2); }
  .notif-item.unread { background: rgba(0,255,136,0.02); }
  .notif-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .notif-icon.success { background: rgba(0,255,136,0.1); color: var(--accent); }
  .notif-icon.fail { background: rgba(255,68,68,0.1); color: var(--danger); }
  .notif-icon.trigger { background: rgba(255,170,0,0.1); color: var(--warn); }
  .notif-icon.new { background: rgba(68,136,255,0.1); color: var(--blue); }
  .notif-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .notif-body { color: var(--text2); font-size: 13px; margin-bottom: 2px; }
  .notif-time { color: #555; font-size: 11px; }
  .notif-view { margin-left: auto; padding: 6px 14px; border-radius: 6px; background: var(--surface3); color: var(--accent); font-size: 11px; font-weight: 700; border: 1px solid var(--border); }

  .table-wrap { background: linear-gradient(180deg, rgba(13,23,19,0.96), rgba(9,16,13,0.96)); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; box-shadow: var(--glow); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 14px 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text2); border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.03); }
  td { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.ok { background: var(--accent); }
  .status-dot.fail { background: var(--danger); }
  .status-dot.warn { background: var(--warn); }

  .modal-back { position: fixed; inset: 0; background: rgba(3,6,5,0.78); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal {
    background: linear-gradient(180deg, rgba(16, 28, 23, 0.98), rgba(10, 17, 14, 0.99)); border: 1px solid rgba(154,179,166,0.12); border-radius: 24px;
    width: 90%; max-width: 440px; max-height: 90vh; overflow: auto; padding: 24px;
    box-shadow: 0 22px 60px rgba(0,0,0,0.34);
  }
  .modal.wide { max-width: 760px; }
  .modal h3 { font-size: 21px; margin-bottom: 20px; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.03em; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* Payment Detail Modal */
  .detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .detail-stat { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px; }
  .detail-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 4px; }
  .detail-stat-value { font-size: 18px; font-weight: 700; }
  .detail-stat-value.green { color: var(--accent); }
  .detail-stat-value.red { color: var(--danger); }
  .detail-stat-value.blue { color: var(--blue); }
  .detail-section { margin-bottom: 20px; }
  .detail-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 10px; }
  .charge-table { font-size: 12px; }
  .charge-table th { padding: 8px 12px; }
  .charge-table td { padding: 8px 12px; }

  /* Metrics */
  .metrics-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .metrics-header h2 { font-size: 20px; font-weight: 900; }
  .metrics-header span { font-size: 12px; color: var(--text3); }
  .metrics-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
  .metrics-grid-wide { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .chart-card {
    background: linear-gradient(180deg, rgba(13,23,19,0.95), rgba(9,16,13,0.94)); border: 1px solid var(--border); border-radius: 22px; padding: 20px;
    transition: border-color 0.2s;
    box-shadow: var(--glow);
  }
  .chart-card:hover { border-color: var(--border2); }
  .chart-card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text2); margin-bottom: 4px; }
  .chart-card .chart-subtitle { font-size: 11px; color: var(--text3); margin-bottom: 14px; }
  .chart-wrap { height: 240px; position: relative; }
  .chart-wrap.tall { height: 300px; }

  /* Admin */
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .admin-card {
    background: linear-gradient(180deg, rgba(13,23,19,0.95), rgba(9,16,13,0.94)); border: 1px solid var(--border); border-radius: 20px; padding: 20px;
    box-shadow: var(--glow);
  }

<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback, useRef } = React;
const e = React.createElement;

const API =
  window.location.protocol === 'file:' || window.location.origin === 'null'
    ? 'http://localhost:3000'
    : window.location.origin;

// Global error display — catches React crashes and shows the error on screen
window.addEventListener('error', (ev) => {
  const root = document.getElementById('root');
  if (root) {
    const msg = String(ev.message || 'Unknown error').replace(/[<>]/g, '');
    const stack = String(ev.error?.stack || 'No stack trace').replace(/[<>]/g, '');
    root.innerHTML = `<div style="color:#ff4444;padding:40px;font-family:monospace;font-size:14px;">
      <h2 style="color:#fff;margin-bottom:12px;">⚠️ Something crashed</h2>
      <p style="color:#ff8888;margin-bottom:8px;">${msg}</p>
      <pre style="color:var(--text2);font-size:11px;overflow:auto;max-height:300px;">${stack}</pre>
      <button onclick="localStorage.removeItem('paypulse_token');location.reload()" style="margin-top:16px;padding:10px 20px;background:#00ff88;color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer;">Clear token & reload</button>
    </div>`;
  }
});

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}, ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
}

const CURRENCIES = ['usd', 'cad', 'gbp', 'eur', 'aud'];
function normalizeCurrency(value) {
  const currency = String(value || 'usd').toLowerCase();
  return CURRENCIES.includes(currency) ? currency : 'usd';
}
function formatMoney(amount, currency = 'usd') {
  const value = Number(amount) || 0;
  return `${normalizeCurrency(currency).toUpperCase()} ${value.toFixed(2)}`;
}

function safeJsonParse(value, fallback = null) {
  if (!value) return fallback;
  try { return JSON.parse(value); } catch { return fallback; }
}

function api(path, opts) {
  const token = localStorage.getItem('paypulse_token');
  return fetch(API + path, {
    ...opts,
    headers: {
      ...(opts?.headers || {}),
      ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
      'Content-Type': 'application/json'
    }
  }).then(async r => {
    const data = await r.json().catch(() => ({}));
    if (token && (r.status === 401 || (r.status === 403 && data.error === 'Invalid token'))) {
      localStorage.removeItem('paypulse_token');
      window.location.reload();
      throw new Error('Session expired. Please log in again.');
    }
    if (!r.ok) throw new Error(data.error || 'Request failed');
    return data;
  }).catch(err => {
    if (err.message === 'Failed to fetch') throw new Error('Server unreachable — check your connection');
    throw err;
  });
}

// ─── UI COMPONENTS ────────────────────────────────────────────────
function Button({ loading, children, className, onClick, disabled, style }) {
  return e('button', { className, style, disabled: disabled || loading, onClick },
    loading ? e('span', { style: { marginRight: 6 } }, '\u23F3') : null,
    children
  );
}

function Toast({ toast, onDismiss }) {
  if (!toast) return null;
  const bg = toast.type === 'error' ? '#ff4444' : toast.type === 'success' ? 'var(--accent)' : toast.type === 'warn' ? '#ffaa00' : 'var(--blue)';
  return e('div', {
    style: {
      position: 'fixed', top: 24, right: 24, zIndex: 9999,
      background: bg, color: '#000', padding: '12px 20px',
      borderRadius: 10, fontWeight: 700, fontSize: 14,
      boxShadow: '0 8px 24px rgba(0,0,0,0.4)', animation: 'slideIn .3s ease',
      cursor: 'pointer'
    },
    onClick: onDismiss
  }, toast.message);
}

// ─── AUTH PAGE ────────────────────────────────────────────────────
function AuthPage({ onAuth }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [mode, setMode] = useState('login'); // 'login' | 'signup'
  const [name, setName] = useState('');
  const [companyName, setCompanyName] = useState('');
  const [signupDone, setSignupDone] = useState(false);

  const submit = async () => {
    if (mode === 'login') {
      setError(''); setLoading(true);
      try {
        const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
        localStorage.setItem('paypulse_token', res.token);
        window.location.hash = 'customers';
        onAuth();
      } catch (err) { setError(err.message); }
      setLoading(false);
    } else {
      setError(''); setLoading(true);
      try {
        const res = await api('/api/auth/signup', { method: 'POST', body: JSON.stringify({ name, email, password, companyName }) });
        setSignupDone(true);
      } catch (err) { setError(err.message); }
      setLoading(false);
    }
  };

  const handleKeyDown = (ev) => { if (ev.key === 'Enter' && !loading) submit(); };

  if (signupDone) return e('div', { className: 'auth-wrap' },
    e('div', { className: 'auth-box', style: { textAlign: 'center' } },
      e('div', { style: { fontSize: 48, marginBottom: 16 } }, '✅'),
      e('h2', { style: { marginBottom: 12 } }, 'Account created!'),
      e('div', { style: { color: 'var(--text2)', fontSize: 14, marginBottom: 20, lineHeight: 1.6 } },
        'Your account is pending admin approval. You\'ll be able to log in once an admin approves your account.'
      ),
      e('button', { className: 'btn-primary', onClick: () => { setMode('login'); setSignupDone(false); setError(''); } }, 'Back to Login')
    )
  );

  return e('div', { className: 'auth-wrap' },
    e('div', { className: 'auth-box' },
      e('div', { className: 'auth-logo' },
        e('div', { className: 'auth-logo-icon' }, '⚡'),
        e('span', { className: 'auth-logo-text' }, 'PAYPULSE')
      ),
      e('div', { className: 'auth-subtitle', style: { color: 'var(--text2)', fontSize: 14, marginBottom: 28, textAlign: 'center' } },
        mode === 'login' ? 'Pay-Per-Appointment Billing for SMMAs' : 'Create your agency account'
      ),
      error && e('div', { className: 'error-msg', style: { marginBottom: 12 } }, error),
      mode === 'signup' && e('div', { className: 'form-group' },
        e('label', null, 'Your Name'),
        e('input', { placeholder: 'John Smith', value: name, onChange: ev => setName(ev.target.value) })
      ),
      mode === 'signup' && e('div', { className: 'form-group' },
        e('label', null, 'Company Name'),
        e('input', { placeholder: 'My Agency Inc.', value: companyName, onChange: ev => setCompanyName(ev.target.value) })
      ),
      e('div', { className: 'form-group' },
        e('label', null, 'Email'),
        e('input', { type: 'email', placeholder: 'you@company.com', value: email, onChange: ev => setEmail(ev.target.value), onKeyDown: handleKeyDown })
      ),
      e('div', { className: 'form-group' },
        e('label', null, 'Password'),
        e('input', { type: 'password', placeholder: '••••••••', value: password, onChange: ev => setPassword(ev.target.value), onKeyDown: handleKeyDown })
      ),
      e('button', { className: 'btn-primary', onClick: submit, disabled: loading, style: { marginTop: 8 } },
        loading ? 'Please wait...' : (mode === 'login' ? 'Log In' : 'Create Account')
      ),
      e('div', { style: { textAlign:'center', marginTop:20, color:'var(--text2)', fontSize:12, cursor:'pointer' }, onClick: () => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); } },
        mode === 'login' ? "Don't have an account? Sign up" : 'Already have an account? Log in'
      )
    )
  );
}

function PaymentDetailModal({ customer, settings, onClose, onRefresh, showToast }) {
  const [details, setDetails] = useState(null);

  const load = useCallback(async () => {
    setLoading(true);

      const [detailData, timelineData] = await Promise.all([
        api('/api/customers/' + customer.id + '/payment-details'),

    }
    setLoading(false);
  }, [customer.id, customer.rate_per_trigger, settings?.metaAdAccountId, settings?.metaConnected, showToast]);

  useEffect(() => { load(); }, [load]);

  const saveRate = async () => {
    setSavingRate(true);
    try {
      await api('/api/customers/' + customer.id, { method: 'PATCH', body: JSON.stringify({ rate_per_trigger: parseFloat(newRate) || 147 }) });
      showToast('Rate updated', 'success');
      await onRefresh();
      await load();
    } catch (err) {
      showToast(err.message, 'error');
    }
    setSavingRate(false);

  const fireCharge = async () => {
    try {
      const amount = parseFloat(chargeAmount);

        showToast('Enter a one-off amount greater than $0', 'error');
        return;
      }
      if (!chargeNote.trim()) {
        showToast('Add a reason for the one-off charge', 'error');

      const res = await api('/api/customers/' + customer.id + '/one-off-charge', { method: 'POST', body: JSON.stringify({ amount, reason: chargeNote }) });
      showToast(res.status === 'succeeded' ? 'Charge succeeded' : `Charge ${res.status}`, res.status === 'succeeded' ? 'success' : 'warn');
      setChargeNote('');

  const retryCharge = async (chargeId) => {

// ─── CUSTOMERS PAGE ───────────────────────────────────────────────
function CustomersPage({ customers, onRefresh, settings, showToast }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [chargeModal, setChargeModal] = useState(null);
  const [editModal, setEditModal] = useState(null);
  const [detailModal, setDetailModal] = useState(null);
  const [note, setNote] = useState('');
  const [oneOffAmount, setOneOffAmount] = useState('');
  const [syncModal, setSyncModal] = useState(false);
  const [draggingCustomerId, setDraggingCustomerId] = useState(null);
  const [dragOverStatus, setDragOverStatus] = useState(null);

  const processors = { all: 'All', whop: 'Whop', stripe: 'Stripe' };

  const filtered = customers.filter(c => {
    if (filter !== 'all' && filter !== c.processor) return false;
    if (search && !c.name.toLowerCase().includes(search.toLowerCase()) && !c.email.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const byStatus = { new: [], active: [], at_risk: [], paused: [] };
  filtered.forEach(c => {
    const s = byStatus[c.status] ? c.status : 'new';
    byStatus[s].push(c);
  });
  const customerCurrencies = [...new Set(customers.map(c => normalizeCurrency(c.currency)))];
  const totalCharged = customers.reduce((s, c) => s + (c.total_charged || 0), 0);

  const colKeys = ['new', 'active', 'at_risk', 'paused'];

  const updateCustomerStatus = async (customerId, newStatus) => {
    const cust = customers.find(c => c.id === customerId);
    if (!cust || cust.status === newStatus) return;
    try {
      await api('/api/customers/' + customerId, {
        method: 'PATCH',
        body: JSON.stringify({ status: newStatus })
      });
      showToast(`${cust.name} moved to ${newStatus.replace('_', ' ')}`, 'success');
      await onRefresh();
    } catch (err) {
      showToast('Update failed: ' + (err.message || 'Unknown error'), 'error');
    }
  };

  const doCharge = async () => {
    setChargeModal({ ...chargeModal, loading: true });
    try {
      const amount = parseFloat(oneOffAmount);
      if (!Number.isFinite(amount) || amount <= 0) throw new Error('Enter a one-off amount greater than $0');
      if (!note.trim()) throw new Error('Add a reason for the one-off charge');
      const res = await api('/api/customers/' + chargeModal.id + '/one-off-charge', { method: 'POST', body: JSON.stringify({ amount, reason: note }) });
      showToast(res.status === 'succeeded' ? 'One-off charge succeeded' : `One-off charge ${res.status}`, res.status === 'succeeded' ? 'success' : 'warn');
      setChargeModal(null); setNote(''); setOneOffAmount(''); onRefresh();
    } catch (err) {
      showToast(err.message || 'Charge failed', 'error');
      setChargeModal({ ...chargeModal, loading: false });
    }
  };
  const quickChargeAmount = parseFloat(oneOffAmount) || 0;
  const quickChargeCurrency = normalizeCurrency(chargeModal?.currency);

  const doEdit = async () => {
    setEditModal({ ...editModal, saving: true });
    try {
      const ratePerTrigger = Number(editModal.rate_per_trigger);
      const normalizedRate = Number.isFinite(ratePerTrigger) && ratePerTrigger > 0 ? ratePerTrigger : 147;
      const currency = normalizeCurrency(editModal.currency);
      const hasPaymentMethod = !!(editModal.stripe_payment_method_id || editModal.whop_payment_method_id);
      if (editModal.id === 'new') {
        await api('/api/customers', { method: 'POST', body: JSON.stringify({ name: editModal.name, email: editModal.email, currency, rate_per_trigger: normalizedRate, status: editModal.status, ghl_location_id: editModal.ghl_location_id, stripe_customer_id: editModal.stripe_customer_id || '', stripe_payment_method_id: editModal.stripe_payment_method_id || '', whop_member_id: editModal.whop_member_id || '', whop_payment_method_id: editModal.whop_payment_method_id || '', card_on_file: hasPaymentMethod }) });
        showToast('Customer added!', 'success');
      } else {
        await api('/api/customers/' + editModal.id, { method: 'PATCH', body: JSON.stringify({ currency, rate_per_trigger: normalizedRate, status: editModal.status, name: editModal.name, company_name: editModal.company_name, ghl_location_id: editModal.ghl_location_id, stripe_customer_id: editModal.stripe_customer_id || '', stripe_payment_method_id: editModal.stripe_payment_method_id || '', whop_member_id: editModal.whop_member_id || '', whop_payment_method_id: editModal.whop_payment_method_id || '', card_on_file: hasPaymentMethod }) });
        showToast('Customer updated!', 'success');
      }
      setEditModal(null); await onRefresh();
    } catch (err) {
      showToast(err.message || 'Save failed', 'error');
      setEditModal({ ...editModal, saving: false });
    }
  };

  const colConfig = [
    { key: 'new', label: 'New', color: '#4488ff' },
    { key: 'active', label: 'Active', color: '#00ff88' },
    { key: 'at_risk', label: 'At Risk', color: '#ff4444' },
    { key: 'paused', label: 'Paused', color: '#ffaa00' },
  ];

  return e('div', { className: 'page' },
    e('div', { className: 'stats-row' },
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, 'Customers'),
        e('div', { className: 'stat-value' }, customers.length)
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, 'Cards on File'),
        e('div', { className: 'stat-value blue' }, customers.filter(c => c.card_on_file).length)
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, 'Total Charged'),
        e('div', { className: 'stat-value' }, customerCurrencies.length <= 1 ? formatMoney(totalCharged, customerCurrencies[0] || 'usd') : totalCharged.toFixed(0) + ' mixed')
      )
    ),
    e('div', { className: 'filters' },
      e('div', { style: { display:'flex', alignItems:'center', gap:8 } },
        e('span', { style: { fontWeight:700, fontSize:13, textTransform:'uppercase', letterSpacing:1 } }, 'Customers'),
        e('span', { className: 'tag tag-green', style: { borderRadius:10 } }, customers.length)
      ),
      e('div', { className: 'nav-spacer' }),
      e('button', { className: 'btn-primary', style: { padding:'8px 18px', fontSize:13 }, onClick: () => setEditModal({ id: 'new', name: '', email: '', currency: 'usd', rate_per_trigger: 147, status: 'new', ghl_location_id: '', card_on_file: false }) }, '+ Add Customer'),
      e('button', { className: 'btn-sm', style: { padding:'8px 16px' }, onClick: onRefresh }, '↻ Sync'),
      e('button', { className: 'btn-sm', style: { padding:'8px 16px', background:'rgba(0,180,255,0.1)', color:'var(--blue)', borderColor:'rgba(0,180,255,0.3)' }, onClick: () => setSyncModal(true) }, '⬇ Stripe'),
      e('input', { className: 'search-box', placeholder: 'Search...', value: search, onChange: ev => setSearch(ev.target.value) })
    ),
    e('div', { className: 'filters', style: { marginBottom:24 } },
      Object.entries(processors).map(([k, v]) =>
        e('div', {
          key: k,
          className: 'filter-pill ' + (filter===k ? 'active' : ''),
          onClick: () => setFilter(k)
        },
          k === 'whop' ? '\u26A1 ' : k === 'stripe' ? '\u25C6 ' : '',
          v,
          e('span', { className: 'count' }, k === 'all' ? customers.length : customers.filter(c => c.processor === k).length)
        )
      )
    ),
    e('div', { className: 'kanban' },
      colConfig.map(col =>
        e('div', {
          key: col.key,
          className: 'kanban-col' + (dragOverStatus === col.key ? ' drag-over' : ''),
          'data-status': col.key,
          onDragOver: ev => { ev.preventDefault(); setDragOverStatus(col.key); },
          onDragLeave: ev => {
            if (ev.currentTarget.contains(ev.relatedTarget)) return;
            setDragOverStatus(null);
          },
          onDrop: async ev => {
            ev.preventDefault();
            setDragOverStatus(null);
            const customerId = ev.dataTransfer.getData('text/plain');
            if (customerId) await updateCustomerStatus(customerId, col.key);
          }
        },
          e('div', { className: 'kanban-col-header' },
            e('span', { className: 'dot', style: { background: col.color } }),
            col.label,
            e('span', { className: 'count' }, byStatus[col.key].length)
          ),
          e('div', { id: 'kanban-' + col.key, className: 'kanban-sortable' },
            byStatus[col.key].map(c =>
              e('div', {
                key: c.id,
                'data-customer-id': c.id,
                className: 'customer-wrap' + (draggingCustomerId === c.id ? ' dragging' : ''),
                draggable: true,
                onDragStart: ev => {
                  ev.dataTransfer.setData('text/plain', c.id);
                  ev.dataTransfer.effectAllowed = 'move';
                  setDraggingCustomerId(c.id);
                },
                onDragEnd: () => {
                  setDraggingCustomerId(null);
                  setDragOverStatus(null);
                }
              },
                e(CustomerCard, {
                  customer: c,
                  onCharge: setChargeModal,
                  onEdit: setEditModal,
                  webhookSecret: settings?.ghlWebhookSecret,
                  onAnalytics: () => setDetailModal(c),
                  onDelete: async (cust) => {
                    try {
                      await api('/api/customers/' + cust.id, { method: 'DELETE' });
                      showToast(cust.name + ' deleted', 'success');
                      onRefresh();
                    } catch (err) { showToast(err.message, 'error'); }
                  }
                })
              )
            ),
            byStatus[col.key].length === 0 && e('div', { className: 'kanban-col-empty' }, 'Drop clients here')
          )
        )
      )
    ),
    chargeModal && e('div', { className: 'modal-back', onClick: ev => ev.target === ev.currentTarget && setChargeModal(null) },
      e('div', { className: 'modal' },
        e('h3', null, 'One-off Charge ' + chargeModal.name),
        e('div', { style: { color: 'var(--text2)', fontSize: 13, marginBottom: 16 } },
          'Use this only for non-appointment extras like setup fees, add-ons, or custom work. This will not count as a booked appointment charge.'
        ),
        e('div', { style: { padding: 12, border: '1px solid rgba(255,191,95,0.24)', background: 'rgba(255,191,95,0.08)', borderRadius: 10, color: 'var(--warn)', fontSize: 12, lineHeight: 1.5, marginBottom: 14 } },
          'This will immediately attempt a one-off charge for ', e('strong', null, chargeModal.name), '. Current amount: ', e('strong', null, formatMoney(quickChargeAmount, quickChargeCurrency)), '.'
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'One-off Amount (' + quickChargeCurrency.toUpperCase() + ')'),
          e('input', { type: 'number', min: '0', step: '0.01', placeholder: '250.00', value: oneOffAmount, onChange: ev => setOneOffAmount(ev.target.value) })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Reason'),
          e('input', { placeholder: 'Required, e.g. setup fee, extra campaign work', value: note, onChange: ev => setNote(ev.target.value) })
        ),
        e('div', { className: 'modal-actions' },
          e('button', { className: 'btn-ghost', onClick: () => { setChargeModal(null); setOneOffAmount(''); setNote(''); } }, 'Cancel'),
          e(Button, { className: 'btn-primary', loading: chargeModal.loading, onClick: doCharge }, 'Charge ' + formatMoney(quickChargeAmount, quickChargeCurrency) + ' Now')
        )
      )
    ),
    detailModal && e(PaymentDetailModal, {
      customer: detailModal,
      settings,
      onClose: () => setDetailModal(null),
      onRefresh,
      showToast
    }),
    syncModal && e(SyncFromStripeModal, {
      onClose: () => setSyncModal(false),
      onImported: onRefresh,
      showToast
    }),
    editModal && e('div', { className: 'modal-back', onClick: ev => ev.target === ev.currentTarget && setEditModal(null) },
      e('div', { className: 'modal wide' },
        e('h3', null, editModal.id === 'new' ? 'Add Customer' : 'Edit ' + editModal.name),
        e('div', { className: 'form-group' },
          e('label', null, 'Name'),
          e('input', { value: editModal.name, onChange: ev => setEditModal({...editModal, name: ev.target.value}) })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Email'),
          e('input', { type: 'email', value: editModal.email || '', onChange: ev => setEditModal({...editModal, email: ev.target.value}) })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Billing Amount per Trigger — set any amount'),
          e('input', { type: 'number', min: 1, step: 0.01, value: editModal.rate_per_trigger, onChange: ev => setEditModal({...editModal, rate_per_trigger: ev.target.value === '' ? '' : parseFloat(ev.target.value)}) })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Customer Currency'),
          e('select', { value: normalizeCurrency(editModal.currency), onChange: ev => setEditModal({...editModal, currency: ev.target.value}) },
            CURRENCIES.map(cur => e('option', { key: cur, value: cur }, cur.toUpperCase()))
          )
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Status'),
          e('select', { value: editModal.status, onChange: ev => setEditModal({...editModal, status: ev.target.value}) },
            e('option', { value: 'new' }, 'New'),
            e('option', { value: 'active' }, 'Active'),

          e('div', { className: 'form-group' },

            e('input', { placeholder: 'Whop member/user ID', value: editModal.whop_member_id || '', onChange: ev => setEditModal({...editModal, whop_member_id: ev.target.value}) })
          ),
          e('div', { className: 'form-group' },
            e('label', null, 'Whop Payment Method ID'),
            e('input', { placeholder: 'pmt_... or payt_... saved payment method', value: editModal.whop_payment_method_id || '', onChange: ev => setEditModal({...editModal, whop_payment_method_id: ev.target.value, card_on_file: !!ev.target.value || !!editModal.stripe_payment_method_id}) })

// ─── SYNC FROM STRIPE MODAL ────────────────────────────────────
function SyncFromStripeModal({ onClose, onImported, showToast }) {
  const [customers, setCustomers] = useState(null);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState({});
  const [importing, setImporting] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const list = await api('/api/stripe/customers');
      setCustomers(list);
    } catch (err) { showToast(err.message, 'error'); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const toggle = (id) => setSelected(prev => ({ ...prev, [id]: !prev[id] }));

  const doImport = async () => {
    const ids = Object.entries(selected).filter(([,v]) => v).map(([k]) => k);
    if (!ids.length) { showToast('Select at least one customer', 'warn'); return; }
    setImporting(true);
    try {
      const res = await api('/api/customers/import-stripe', { method: 'POST', body: JSON.stringify({ customerIds: ids }) });
      showToast(`✓ ${res.imported} imported · ${res.skipped} skipped`, 'success');
      await onImported();
      onClose();
    } catch (err) { showToast(err.message, 'error'); }
    setImporting(false);
  };

  const allSelected = customers && selected && Object.keys(selected).filter(k => selected[k]).length === customers.length;

  return e('div', { className: 'modal-back', onClick: ev => ev.target === ev.currentTarget && onClose() },
    e('div', { className: 'modal wide', style: { maxHeight: '80vh', display: 'flex', flexDirection: 'column' } },
      e('h3', null, 'Import from Stripe'),
      e('div', { style: { color: 'var(--text2)', fontSize: 13, marginBottom: 16 } },
        customers ? `Found ${customers.length} Stripe customers` : 'Loading...'
      ),
      loading && e('div', { style: { textAlign: 'center', padding: 40, color: 'var(--text2)' } }, 'Loading...'),
      !loading && customers && e('div', { style: { flex: 1, overflow: 'auto', marginBottom: 16 } },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 8, padding: '8px 0', borderBottom: '1px solid var(--border)', cursor: 'pointer' }, onClick: () => {
          const all = {};
          customers.forEach(c => { all[c.id] = !allSelected; });
          setSelected(all);
        } },
          e('input', { type: 'checkbox', checked: !!allSelected, readOnly: true, style: { accentColor: 'var(--accent)' } }),
          e('strong', { style: { fontSize: 12 } }, allSelected ? 'Deselect all' : 'Select all')
        ),
        customers.map(c =>
          e('div', { key: c.id, style: { display: 'flex', alignItems: 'center', gap: 8, padding: '10px 0', borderBottom: '1px solid var(--border)', cursor: 'pointer' }, onClick: () => toggle(c.id) },
            e('input', { type: 'checkbox', checked: !!selected[c.id], readOnly: true, style: { accentColor: 'var(--accent)' } }),
            e('div', { style: { flex: 1 } },
              e('div', { style: { fontWeight: 600, fontSize: 13 } }, c.name),
              e('div', { style: { color: 'var(--text2)', fontSize: 11 } }, c.email ? c.email.split('@')[0] + '…' : '')
            ),
            c.card_on_file
              ? e('span', { className: 'tag tag-green', style: { fontSize: 9 } }, '✓ Card')
              : e('span', { className: 'tag tag-red', style: { fontSize: 9 } }, 'No card')
          )
        )
      ),
      !loading && customers && e('div', { className: 'modal-actions' },
        e('button', { className: 'btn-ghost', onClick: onClose }, 'Cancel'),
        e(Button, { className: 'btn-primary', loading: importing, onClick: doImport },
          importing ? 'Importing...' : `Import ${Object.values(selected).filter(Boolean).length} Selected`
        )
      )
    )
  );
}

function SettingsPage({ settings, onSave, showToast }) {
  const [s, setS] = useState(settings || {});

  const [dirty, setDirty] = useState(false);
  const [passwordForm, setPasswordForm] = useState({ currentPassword: '', newPassword: '', confirmPassword: '' });
  const [savingPassword, setSavingPassword] = useState(false);

  useEffect(() => { if (settings && !dirty) setS(settings); }, [settings, dirty]);

  const update = (patch) => { setDirty(true); setS(prev => ({...prev, ...patch})); };
  const updatePassword = (patch) => setPasswordForm(prev => ({ ...prev, ...patch }));

  const save = async () => {
    setSaving(true);
    try {
      await api('/api/settings', { method: 'POST', body: JSON.stringify({
        companyName: s.companyName, processor: s.processor,
        stripeSecretKey: s.stripeSecretKey, stripePublishableKey: s.stripePublishableKey,
        whopApiKey: s.whopApiKey, whopCompanyId: s.whopCompanyId,
        appointmentTrackingMode: s.appointmentTrackingMode,
        failedChargeWebhookUrl: s.failedChargeWebhookUrl || '',
      }) });
      setDirty(false);
      showToast('Settings saved!', 'success');
      onSave();
    } catch (err) {
      showToast(err.message || 'Save failed', 'error');
    }
    setSaving(false);
  };

  const copy = (text) => { navigator.clipboard.writeText(text); };

  const savePassword = async () => {
    if (!passwordForm.currentPassword || !passwordForm.newPassword) {
      showToast('Current password and new password required', 'error');
      return;
    }
    if (passwordForm.newPassword !== passwordForm.confirmPassword) {
      showToast('New passwords do not match', 'error');
      return;
    }
    if (passwordForm.newPassword.length < 6) {
      showToast('New password must be at least 6 characters', 'error');
      return;
    }
    setSavingPassword(true);
    try {
      await api('/api/auth/change-password', {
        method: 'POST',

          currentPassword: passwordForm.currentPassword,
          newPassword: passwordForm.newPassword

// ─── INBOX PAGE ─────────────────────────────────────────────────
function InboxPage({ notifications, onRefresh, showToast }) {
  const markAll = async () => { try { await api('/api/notifications/read', {method:'POST'}); onRefresh(); } catch (err) { showToast(err.message, 'error'); } };
  const deleteOne = async (id) => {
    if (!confirm('Delete this notification?')) return;
    try {
      await api('/api/notifications/' + id, { method: 'DELETE' });
      showToast('Notification deleted', 'success');
      onRefresh();
    } catch (err) { showToast(err.message, 'error'); }
  };

  const iconFor = (type) => {
    const style = { width:'36px', height:'36px', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px', flexShrink:0 };
    if (type === 'success') return e('div', { className: 'notif-icon success', style }, '\u2713');
    if (type === 'fail') return e('div', { className: 'notif-icon fail', style }, '\u26A0');
    if (type === 'trigger') return e('div', { className: 'notif-icon trigger', style }, '\u26A1');
    return e('div', { className: 'notif-icon new', style }, '\u25C6');
  };

  return e('div', { className: 'page' },
    e('div', { className: 'notif-list' },
      e('div', { className: 'notif-header' },
        e('h3', null, e('span', { style: { color:'var(--accent)' } }, 'Notifications'), ' Inbox'),
        e('span', { className: 'mark-read', onClick: markAll }, 'Mark all read')
      ),
      notifications.map(n =>
        e('div', { key: n.id, className: 'notif-item ' + (!n.read ? 'unread' : '') },
          iconFor(n.type),
          e('div', { style: { flex:1 } },

        )
      ),
      notifications.length === 0 && e('div', { style: { padding: 40, textAlign:'center', color:'#555' } }, 'No notifications yet')
    )

}

// ─── METRICS PAGE ────────────────────────────────────────────────
function MetricsPage({ metrics }) {
  const revChartRef = useRef(null);
  const custChartRef = useRef(null);
  const trigChartRef = useRef(null);

  useEffect(() => {
    if (!metrics) return;
    // Destroy old charts if they exist
    const charts = [];
    const revCtx = revChartRef.current?.getContext('2d');
    const custCtx = custChartRef.current?.getContext('2d');
    const trigCtx = trigChartRef.current?.getContext('2d');

    Chart.defaults.color = '#888';
    Chart.defaults.borderColor = '#2a2a2a';
    Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif';

    // ── Revenue & Failures (30 days, line chart) ──
    if (revCtx) {
      const labels = Object.keys(metrics.revenueByDay);
      const revData = labels.map(k => metrics.revenueByDay[k] || 0);
      const failData = labels.map(k => metrics.failuresByDay[k] || 0);
      // Show ~5 date labels evenly spaced
      const step = Math.max(1, Math.floor(labels.length / 5));
      const tickLabels = labels.map((l, i) => i % step === 0 ? l.slice(5) : '');

      charts.push(new Chart(revCtx, {
        type: 'line',
        data: { labels, datasets: [
          { label: 'Revenue ($)', data: revData, borderColor: '#00ff88', backgroundColor: (ctx) => {
            const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 240);
            g.addColorStop(0, 'rgba(0,255,136,0.25)');
            g.addColorStop(1, 'rgba(0,255,136,0)');
            return g;
          }, fill: true, tension: 0.3, pointRadius: 3, pointHoverRadius: 6, pointBackgroundColor: '#00ff88', borderWidth: 2 },
          { label: 'Failures', data: failData, borderColor: '#ff4444', backgroundColor: 'rgba(255,68,68,0.06)', fill: true, tension: 0.3, pointRadius: 2, pointHoverRadius: 5, borderWidth: 1.5, borderDash: [4, 3] }
        ]},
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#888', usePointStyle: true, padding: 16, font: { size: 11 } } },
            tooltip: {
              backgroundColor: '#1a1a1a', titleColor: '#fff', bodyColor: '#ccc',
              borderColor: '#333', borderWidth: 1, padding: 10,
              callbacks: { label: (ctx) => ctx.dataset.label + ': ' + (ctx.dataset.label.includes('$') ? '$' + ctx.parsed.y.toFixed(0) : ctx.parsed.y) }
            }
          },
          scales: {
            x: { ticks: { callback: (v, i) => tickLabels[i], maxTicksLimit: 8, color: '#555', font: { size: 10 } }, grid: { display: false } },
            y: { beginAtZero: true, ticks: { font: { size: 10 }, color: '#555' }, grid: { color: 'rgba(255,255,255,0.04)' } }
          }
        }
      }));
    }

    // ── Top Customers (bar chart) ──
    if (custCtx) {
      const topNames = metrics.topCustomers.map(c => c.name.length > 14 ? c.name.slice(0, 13) + '…' : c.name);
      const topVals = metrics.topCustomers.map(c => c.totalCharged);
      const topTriggers = metrics.topCustomers.map(c => c.totalTriggers);
      const colors = ['#00ff88', '#4488ff', '#aa66ff', '#ffaa00', '#ff6b35'];

      charts.push(new Chart(custCtx, {
        type: 'bar',
        data: {
          labels: topNames,
          datasets: [
            { label: 'Revenue ($)', data: topVals, backgroundColor: colors.slice(0, topVals.length), borderRadius: 6, barThickness: 32 },
            { label: 'Triggers', data: topTriggers, backgroundColor: 'rgba(68,136,255,0.4)', borderRadius: 6, barThickness: 32 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: true, labels: { color: '#888', usePointStyle: true, padding: 12, font: { size: 11 } } },
            tooltip: {
              backgroundColor: '#1a1a1a', titleColor: '#fff', bodyColor: '#ccc',
              borderColor: '#333', borderWidth: 1, padding: 10
            }
          },
          scales: {
            x: { ticks: { font: { size: 10 }, color: '#888' }, grid: { display: false } },
            y: { beginAtZero: true, ticks: { font: { size: 10 }, color: '#555' }, grid: { color: 'rgba(255,255,255,0.04)' } }
          }
        }
      }));
    }

    // ── Daily Triggers (bar chart) ──
    if (trigCtx) {
      const labels = Object.keys(metrics.triggersByDay);
      const trigData = labels.map(k => metrics.triggersByDay[k] || 0);
      const step2 = Math.max(1, Math.floor(labels.length / 5));
      const tickLabels2 = labels.map((l, i) => i % step2 === 0 ? l.slice(5) : '');

      charts.push(new Chart(trigCtx, {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Triggers', data: trigData, backgroundColor: 'rgba(68,136,255,0.5)', borderRadius: 4, borderSkipped: false }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1a1a', titleColor: '#fff', bodyColor: '#ccc',
              borderColor: '#333', borderWidth: 1, padding: 10
            }
          },
          scales: {
            x: { ticks: { callback: (v, i) => tickLabels2[i], maxTicksLimit: 8, color: '#555', font: { size: 10 } }, grid: { display: false } },
            y: { beginAtZero: true, ticks: { font: { size: 10 }, color: '#555' }, grid: { color: 'rgba(255,255,255,0.04)' } }
          }
        }
      }));
    }

    return () => charts.forEach(c => c.destroy());
  }, [metrics]);

  if (!metrics) return e('div', { className: 'page' }, e('div', { style: { color:'#555', textAlign:'center', padding:60 } }, 'Loading metrics...'));

  const totalRev = metrics.totalRevenue || 0;
  const totalTrig = Object.values(metrics.triggersByDay || {}).reduce((s,v) => s+v, 0);
  const totalFail = Object.values(metrics.failuresByDay || {}).reduce((s,v) => s+v, 0);
  const failRate = totalTrig > 0 ? ((totalFail / totalTrig) * 100).toFixed(1) : '0.0';
  const avgCharge = totalTrig > 0 ? (totalRev / totalTrig).toFixed(0) : '—';
  const bestDay = Object.entries(metrics.revenueByDay || {}).sort((a,b) => b[1]-a[1])[0];

  return e('div', { className: 'page' },
    e('div', { className: 'metrics-header' },
      e('h2', null, '📊 Metrics'),
      e('span', null, 'Last 30 days')
    ),
    // ── Stat row ──
    e('div', { className: 'stats-row' },
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, '💰 Total Revenue'),
        e('div', { className: 'stat-value green', style: { fontSize: 28 } }, '$' + totalRev.toFixed(0))
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, '📋 Total Triggers'),
        e('div', { className: 'stat-value blue' }, totalTrig)
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, '❌ Failed'),
        e('div', { className: 'stat-value ' + (totalFail > 0 ? 'red' : '') }, totalFail + ' (' + failRate + '%)')
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, '📊 Avg per Trigger'),
        e('div', { className: 'stat-value' }, '$' + avgCharge)
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, '👥 Active Customers'),
        e('div', { className: 'stat-value blue' }, metrics.totalCustomers || 0)
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, '⚡ Best Day'),
        e('div', { className: 'stat-value green', style: { fontSize: 16 } }, bestDay ? '$' + bestDay[1].toFixed(0) : '—')
      )
    ),
    // ── Charts ──
    e('div', { className: 'metrics-grid' },
      e('div', { className: 'chart-card' },
        e('h3', null, 'Revenue & Failures'),
        e('div', { className: 'chart-subtitle' }, 'Daily revenue (green) and failed charges (red dashed) over 30 days'),
        e('div', { className: 'chart-wrap tall' }, e('canvas', { ref: revChartRef }))
      ),
      e('div', { className: 'chart-card' },
        e('h3', null, 'Top Customers'),
        e('div', { className: 'chart-subtitle' }, 'Revenue and trigger count by client'),
        e('div', { className: 'chart-wrap tall' }, e('canvas', { ref: custChartRef }))
      )
    ),
    e('div', { className: 'metrics-grid-wide' },
      e('div', { className: 'chart-card' },
        e('h3', null, 'Daily Trigger Volume'),
        e('div', { className: 'chart-subtitle' }, 'Number of charges per day (succeeded + failed)'),
        e('div', { className: 'chart-wrap' }, e('canvas', { ref: trigChartRef }))
      ),
      // ── Top customers table ──
      e('div', { className: 'chart-card' },

function OpsPage({ alerts, webhookEvents, auditLogs, forecast, showToast }) {
  const exportCsv = async (type) => {
    try {
      const res = await fetch(API + '/api/export/' + type, {
        headers: {
          'Authorization': 'Bearer ' + localStorage.getItem('paypulse_token')
        }
      });
      const csv = await res.text();
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = type + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    } catch (err) {
      showToast('Export failed', 'error');
    }

// ─── ADMIN PANEL ────────────────────────────────────────────────
function AdminPage({ agencies, adminStats, onRefresh, showToast }) {
  const [showModal, setShowModal] = useState(null);
  const [pending, setPending] = useState([]);
  const activeAgencies = (agencies || []).filter(a => a.approved && a.active);
  const pausedAgencies = (agencies || []).filter(a => a.approved && !a.active);
  const pendingAgencies = (agencies || []).filter(a => !a.approved);

  useEffect(() => {
    api('/api/admin/pending').then(setPending).catch(() => {});
  }, [agencies]);

  const updateAgency = async (id, data) => {
    try {
      await api('/api/admin/agencies/' + id, { method: 'PATCH', body: JSON.stringify(data) });
      onRefresh();
    } catch (err) { showToast(err.message, 'error'); }
  };

  const deleteAgency = async (id) => {
    if (!confirm('Delete this agency? This cannot be undone.')) return;
    try {
      await api('/api/admin/agencies/' + id, { method: 'DELETE' });
      onRefresh();
    } catch (err) { showToast(err.message, 'error'); }
  };

  const pauseAgency = async (agency) => {
    const reason = prompt('Why are we pausing this agency?', 'Manual pause by admin');
    if (reason === null) return;
    await updateAgency(agency.id, { active: false, billingStatus: 'manual_pause', pausedReason: reason || 'Manual pause by admin' });
    showToast('Agency paused. They cannot access PayPulse until reactivated.', 'success');
  };

  const reactivateAgency = async (agency) => {
    if (!confirm('Reactivate this agency and restore app access?')) return;
    await updateAgency(agency.id, { active: true, billingStatus: 'current' });
    showToast('Agency reactivated.', 'success');
  };

  const statusTag = (agency) => {
    if (!agency.approved) return e('span', { className: 'tag tag-yellow' }, 'Pending');
    if (!agency.active) return e('span', { className: 'tag tag-red' }, agency.billingStatus === 'failed' || agency.billingStatus === 'past_due' ? 'Billing Issue' : 'Paused');
    return e('span', { className: 'tag tag-green' }, 'Active');
  };

  const pipelineCard = (agency) =>
    e('div', { key: agency.id, className: 'admin-card', style: { padding: 14, marginBottom: 10, border: !agency.active && agency.approved ? '1px solid var(--danger)' : '1px solid var(--border)' } },
      e('div', { style: { display:'flex', justifyContent:'space-between', gap: 10, alignItems:'flex-start' } },
        e('div', null,
          e('div', { style: { fontWeight: 700, fontSize: 13 } }, agency.companyName || agency.name || 'Agency'),
          e('div', { style: { color:'var(--text2)', fontSize: 11, marginTop: 3 } }, agency.email)
        ),
        statusTag(agency)
      ),
      e('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap: 8, marginTop: 12, fontSize: 11, color:'var(--text2)' } },
        e('div', null, 'Plan: ', e('strong', { style: { color:'var(--text)' } }, agency.plan || 'free')),
        e('div', null, 'MRR: ', e('strong', { style: { color:'var(--accent)' } }, '$' + Number(agency.monthlyRate || 0).toFixed(0))),
        e('div', null, 'Billing: ', e('strong', { style: { color:'var(--text)' } }, agency.billingStatus || 'current')),

// ─── ADMIN SETTINGS PAGE ────────────────────────────────────────
function AdminSettingsPage({ user, onSave }) {
  const [currentPassword, setCurrentPassword] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [newEmail, setNewEmail] = useState(user?.email || '');
  const [error, setError] = useState('');
  const [saved, setSaved] = useState(false);
  const [loading, setLoading] = useState(false);

  const save = async () => {
    setError(''); setSaved(false);
    if (!currentPassword || !newPassword) { setError('Current password and new password required'); return; }
    if (newPassword !== confirmPassword) { setError('New passwords do not match'); return; }
    if (newPassword.length < 6) { setError('New password must be at least 6 characters'); return; }
    setLoading(true);
    try {
      await api('/api/auth/change-password', {
        method: 'POST',
        body: JSON.stringify({ currentPassword, newPassword, email: newEmail !== user?.email ? newEmail : undefined })
      });
      setSaved(true); setCurrentPassword(''); setNewPassword(''); setConfirmPassword('');
      setTimeout(() => setSaved(false), 3000);
      onSave();
    } catch (err) { setError(err.message); }
    setLoading(false);
  };

  return e('div', { className: 'page' },
    e('div', { className: 'page-title' }, 'Account Settings'),
    e('div', { className: 'settings-grid' },
      e('div', { className: 'settings-card' },
        e('h3', null, 'Change Login Info'),
        e('div', { style: { color: 'var(--text2)', fontSize: 13, marginBottom: 20 } },
          'Update your admin password and email address.'
        ),
        error && e('div', { className: 'error-msg', style: { marginBottom: 12 } }, error),
        saved && e('div', { style: { color: 'var(--accent)', fontSize: 13, marginBottom: 12, fontWeight: 600 } }, '\u2713 Settings saved successfully'),
        e('div', { className: 'form-group' },
          e('label', null, 'Email'),
          e('input', { type: 'email', value: newEmail, onChange: ev => setNewEmail(ev.target.value), placeholder: 'admin@paypulse.co' })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Current Password'),
          e('input', { type: 'password', value: currentPassword, onChange: ev => setCurrentPassword(ev.target.value), placeholder: '••••••••' })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'New Password'),
          e('input', { type: 'password', value: newPassword, onChange: ev => setNewPassword(ev.target.value), placeholder: '••••••••' })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Confirm New Password'),
          e('input', { type: 'password', value: confirmPassword, onChange: ev => setConfirmPassword(ev.target.value), placeholder: '••••••••' })
        ),
        e('button', { className: 'btn-primary', onClick: save, disabled: loading },
          loading ? 'Saving...' : 'Save Changes'
        )
      )
    )
  );
}

function SubAdminsPage({ showToast }) {
  const [subAdmins, setSubAdmins] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showCreate, setShowCreate] = useState(false);

  const load = useCallback(async () => {
    try {
      const data = await api('/api/admin/subadmins');
      setSubAdmins(data);
    } catch (err) { showToast(err.message, 'error'); }
    setLoading(false);
  }, [showToast]);

  useEffect(() => { load(); }, [load]);

  const deleteSub = async (id) => {
    if (!confirm('Delete this sub-admin?')) return;
    try {
      await api('/api/admin/subadmins/' + id, { method: 'DELETE' });
      showToast('Sub-admin deleted', 'success');
      load();

  if (loading) return e('div', { className: 'page' }, e('h2', { className: 'page-title' }, 'Loading...'));

function App() {
  const [token, setToken] = useState(localStorage.getItem('paypulse_token'));
  const [user, setUser] = useState(null);
  const [, forceRender] = useState(0);
  // Read page from hash on every render (no state needed for page)
  const page = (window.location.hash.replace('#', '').split('?')[0]) || (user?.role === 'admin' ? 'admin' : 'customers');

  // Listen for hash changes to trigger re-render
  useEffect(() => {
    const onHash = () => forceRender(n => n + 1);
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const [customers, setCustomers] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [settings, setSettings] = useState(null);
  const [charges, setCharges] = useState([]);
  const [metrics, setMetrics] = useState(null);
  const [unreadCount, setUnreadCount] = useState(0);
  const [agencies, setAgencies] = useState([]);
  const [adminStats, setAdminStats] = useState(null);
  const [alerts, setAlerts] = useState([]);
  const [webhookEvents, setWebhookEvents] = useState([]);
  const [auditLogs, setAuditLogs] = useState([]);
  const [forecast, setForecast] = useState(null);
  const [marginDashboard, setMarginDashboard] = useState(null);
  const [syncingAllMeta, setSyncingAllMeta] = useState(false);
  const [toast, setToast] = useState(null);

  const showToast = useCallback((message, type = 'info') => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  const refresh = useCallback(async () => {
    if (!token) return;
    try {
      const me = await api('/api/auth/me');
      setUser(me);

      if (me.role === 'admin') {
        const results = await Promise.allSettled([
          api('/api/admin/agencies'),
          api('/api/admin/stats'),
          api('/api/customers'), api('/api/notifications'), api('/api/settings'),
          api('/api/charges'), api('/api/metrics'), api('/api/notifications/unread-count'),
          api('/api/alerts').catch(() => []), api('/api/webhook-events').catch(() => []), api('/api/audit-logs').catch(() => []),
          api('/api/forecast').catch(() => ({})), api('/api/margin-dashboard').catch(() => ({})),
        ]);
        const [aRes, sRes, cRes, nRes, seRes, chRes, mRes, uRes, alRes, whRes, auRes, forecastRes, marginRes] = results.map(r => r.status === 'fulfilled' ? r.value : null);
        setAgencies(aRes || []);
        setAdminStats(sRes || null);
        setCustomers(cRes || []);
        setNotifications(nRes || []);
        setSettings(seRes || null);
        setCharges(chRes || []);
        setMetrics(mRes || null);
        setUnreadCount(uRes?.count || 0);
        setAlerts(alRes || []);
        setWebhookEvents(whRes || []);
        setAuditLogs(auRes || []);
        setForecast(forecastRes || {});
        setMarginDashboard(marginRes || {});
      } else {
        const results = await Promise.allSettled([
          api('/api/customers'), api('/api/notifications'), api('/api/settings'),
          api('/api/charges'), api('/api/metrics'), api('/api/notifications/unread-count'),
          api('/api/alerts'), api('/api/webhook-events'), api('/api/audit-logs'),
          api('/api/forecast'), api('/api/margin-dashboard'),
        ]);
        const [cRes, nRes, sRes, chRes, mRes, uRes, alRes, whRes, auRes, forecastRes, marginRes] = results.map(r => r.status === 'fulfilled' ? r.value : null);
        setCustomers(cRes || []);
        setNotifications(nRes || []);
        setSettings(sRes || null);
        setCharges(chRes || []);
        setMetrics(mRes || null);
        setUnreadCount(uRes?.count || 0);
        setAlerts(alRes || []);
        setWebhookEvents(whRes || []);
        setAuditLogs(auRes || []);
        setForecast(forecastRes || {});
        setMarginDashboard(marginRes || {});
      }
    } catch (err) { console.error('Refresh failed', err); }
  }, [token]);

  useEffect(() => {
    if (!token) return;
    refresh();
    const iv = setInterval(() => {
      if (document.visibilityState === 'visible') refresh();
    }, 30000);
    return () => clearInterval(iv);
  }, [refresh, token]);

  const logout = () => { localStorage.removeItem('paypulse_token'); setToken(null); setUser(null); window.location.reload(); };

  if (!token) return e(AuthPage, { onAuth: () => setToken(localStorage.getItem('paypulse_token')) });

  const isAdmin = user?.role === 'admin' || user?.role === 'subadmin';

  const agencyNav = [
    { key: 'customers', label: 'Customers' },
    { key: 'settings', label: 'Settings' },
    { key: 'charges', label: 'Charges' },
    { key: 'metrics', label: 'Metrics' },
    { key: 'margin', label: 'Margin' },
  ];
  const adminNav = [
    { key: 'customers', label: 'Customers' },
    { key: 'admin', label: 'Agencies' },
    { key: 'margin', label: 'Margin' },
    ...(user?.role === 'admin' ? [{ key: 'subadmins', label: 'Sub Admins' }] : []),
    { key: 'admin-settings', label: 'Settings' },
  ];

  const navItems = isAdmin ? adminNav : agencyNav;
  const activePage = navItems.some(item => item.key === page) || (!isAdmin && page === 'inbox') ? page : 'customers';

  return e('div', null,
    e('nav', { className: 'nav' },
      e('div', { className: 'logo' },
        e('div', { className: 'logo-icon' }, '⚡'),
        e('span', { style: { color: 'var(--accent)' } }, 'PAYPULSE')
      ),
      navItems.map(item =>
        e('div', {
          key: item.key,
          className: 'nav-link ' + (activePage === item.key ? 'active' : ''),
          onClick: () => { window.location.hash = item.key; }
        }, item.label)
      ),
      e('div', { key: 'guide', className: 'nav-link', style: { cursor: 'pointer' }, onClick: () => window.open('/guide', '_blank') }, '📖 Guide'),
      e('div', { className: 'nav-spacer' }),
      !isAdmin && e('button', { className: 'inbox-btn', onClick: () => { window.location.hash = 'inbox'; } },
        '\uD83D\uDD14',
        unreadCount > 0 && e('span', { className: 'badge' }, unreadCount)
      ),
      e('div', { className: 'nav-link', style: { opacity: 0.5, cursor: 'pointer' }, onClick: logout }, 'Sign Out')
    ),
    !isAdmin && activePage === 'customers' && e(CustomersPage, {
      customers, onRefresh: refresh, settings, showToast
    }),
    !isAdmin && activePage === 'settings' && e(SettingsPage, { settings, onSave: refresh, showToast }),
    !isAdmin && activePage === 'inbox' && e(InboxPage, { notifications, onRefresh: refresh, showToast }),
    !isAdmin && activePage === 'charges' && e(ChargesPage, { charges, showToast }),
    !isAdmin && activePage === 'metrics' && e(MetricsPage, { metrics, showToast }),
    !isAdmin && activePage === 'margin' && e(MarginPage, {
      marginDashboard,
      syncingAllMeta,
      onSyncAllMeta: async () => {
        setSyncingAllMeta(true);
        try {
          const res = await api('/api/meta/sync-all', { method: 'POST', body: JSON.stringify({}) });
          showToast(`Synced ${res.totalCustomers} client${res.totalCustomers === 1 ? '' : 's'}`, 'success');
          await refresh();
        } catch (err) { showToast(err.message, 'error'); }
        setSyncingAllMeta(false);
      },
      showToast
    }),
    isAdmin && activePage === 'admin' && e(AdminPage, { agencies, adminStats, onRefresh: refresh, showToast }),
    isAdmin && activePage === 'customers' && e(CustomersPage, {
      customers, onRefresh: refresh, settings, showToast
    }),
    isAdmin && activePage === 'margin' && e(MarginPage, {
      marginDashboard,
      syncingAllMeta,
      onSyncAllMeta: async () => {
        setSyncingAllMeta(true);
        try {
          const res = await api('/api/meta/sync-all', { method: 'POST', body: JSON.stringify({}) });
          showToast(`Synced ${res.totalCustomers} client${res.totalCustomers === 1 ? '' : 's'}`, 'success');
          await refresh();
        } catch (err) { showToast(err.message, 'error'); }
        setSyncingAllMeta(false);
      },
      showToast
    }),
    isAdmin && activePage === 'subadmins' && e(SubAdminsPage, { showToast }),
    isAdmin && activePage === 'admin-settings' && e(AdminSettingsPage, { user, onSave: refresh, showToast }),
    e(Toast, { toast, onDismiss: () => setToast(null) })
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
</body>
</html>
