<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayPulse — Pay Per Appointment Billing</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text2: #888888;
    --accent: #00ff88;
    --accent2: #00cc6a;
    --danger: #ff4444;
    --warn: #ffaa00;
    --blue: #4488ff;
    --purple: #aa66ff;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  button { cursor: pointer; font-family: inherit; border: none; outline: none; background: none; color: inherit; }
  input, select, textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); outline: none; }
  ::placeholder { color: #555; }

  /* Auth */
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 48px; width: 100%; max-width: 420px;
  }
  .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .auth-logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 22px; }
  .auth-logo-text { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: var(--accent); }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--surface2); color: var(--text2); }
  .auth-tab.active { background: var(--accent); color: #000; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
  .btn-primary {
    padding: 12px 24px; border-radius: 8px; background: var(--accent); color: #000; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; width: 100%;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-ghost { padding: 10px 18px; border-radius: 8px; background: transparent; color: var(--text2); border: 1px solid var(--border); font-weight: 600; }
  .btn-ghost:hover { color: var(--text); }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; }
  .success-msg { color: var(--accent); font-size: 13px; margin-top: 8px; }

  /* Nav */
  .nav {
    display: flex; align-items: center; gap: 8px;
    padding: 0 32px; height: 64px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 800; letter-spacing: 1px; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #000; font-size: 18px; }
  .nav-link {
    padding: 8px 16px; border-radius: 8px; color: var(--text2); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; transition: 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .nav-link:hover { color: var(--text); background: var(--surface2); }
  .nav-link.active { color: var(--accent); background: var(--surface2); border: 1px solid var(--border); }
  .nav-spacer { flex: 1; }
  .inbox-btn {
    position: relative; padding: 8px 14px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 13px; display: flex; align-items: center; gap: 6px;
  }
  .badge {
    position: absolute; top: -4px; right: -4px; background: var(--danger); color: #fff; font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }

  /* Page */
  .page { padding: 32px; max-width: 1400px; margin: 0 auto; }
  .page-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
  }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); font-weight: 600; margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 800; color: var(--accent); }
  .stat-value.red { color: var(--danger); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.yellow { color: var(--warn); }

  .filters { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-pill {
    padding: 6px 14px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
  }
  .filter-pill.active { color: var(--accent); border-color: var(--accent); }
  .filter-pill .count { background: var(--surface3); padding: 2px 7px; border-radius: 10px; font-size: 11px; }
  .search-box { width: 260px; }

  .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .kanban-col { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; min-height: 400px; }
  .kanban-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .kanban-col-header .dot { width: 8px; height: 8px; border-radius: 50%; }
  .kanban-col-header .count { margin-left: auto; background: var(--surface3); padding: 2px 10px; border-radius: 10px; font-size: 11px; }

  .cust-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px;
    margin-bottom: 12px; transition: 0.15s;
  }
  .cust-card:hover { border-color: #444; }
  .cust-name { font-weight: 700; font-size: 15px; margin-bottom: 3px; }
  .cust-rate { font-weight: 800; color: var(--blue); font-size: 14px; margin-bottom: 4px; }
  .cust-email { color: var(--text2); font-size: 12px; margin-bottom: 10px; }
  .cust-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; text-transform: uppercase;
  }
  .tag-green { background: rgba(0,255,136,0.1); color: var(--accent); }
  .tag-red { background: rgba(255,68,68,0.1); color: var(--danger); }
  .tag-blue { background: rgba(68,136,255,0.1); color: var(--blue); }
  .tag-purple { background: rgba(170,102,255,0.1); color: var(--purple); }
  .cust-actions { display: flex; gap: 6px; }
  .btn-sm {
    padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    background: var(--surface3); color: var(--text); border: 1px solid var(--border); transition: 0.15s;
  }
  .btn-sm:hover { background: var(--border); }
  .btn-sm.green { background: rgba(0,255,136,0.1); color: var(--accent); border-color: rgba(0,255,136,0.3); }
  .btn-sm.green:hover { background: rgba(0,255,136,0.2); }
  .btn-sm.purple { background: rgba(170,102,255,0.1); color: var(--purple); border-color: rgba(170,102,255,0.3); }

  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .settings-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px;
  }
  .settings-card h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); margin-bottom: 20px; }
  .processor-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
  .proc-tab {
    flex: 1; padding: 14px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); font-weight: 700; font-size: 13px; text-align: center; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .proc-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.05); }
  .webhook-box {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 10px; word-break: break-all; font-family: monospace; font-size: 12px; color: var(--accent);
  }
  .webhook-box.blue { color: var(--blue); }
  .copy-btn {
    margin-top: 8px; padding: 6px 14px; border-radius: 6px; background: var(--surface3); color: var(--text2); font-size: 11px; font-weight: 600; border: 1px solid var(--border);
  }
  .toggle { width: 48px; height: 26px; border-radius: 13px; background: var(--surface3); border: 1px solid var(--border); position: relative; cursor: pointer; transition: 0.2s; }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: 0.2s; }
  .toggle.on::after { left: 24px; }

  .notif-list { max-width: 800px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .notif-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .notif-header h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .notif-header .mark-read { font-size: 12px; color: var(--text2); cursor: pointer; }
  .notif-item { display: flex; align-items: flex-start; gap: 14px; padding: 16px 20px; border-bottom: 1px solid var(--border); transition: 0.1s; }
  .notif-item:hover { background: var(--surface2); }
  .notif-item.unread { background: rgba(0,255,136,0.02); }
  .notif-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .notif-icon.success { background: rgba(0,255,136,0.1); color: var(--accent); }
  .notif-icon.fail { background: rgba(255,68,68,0.1); color: var(--danger); }
  .notif-icon.trigger { background: rgba(255,170,0,0.1); color: var(--warn); }
  .notif-icon.new { background: rgba(68,136,255,0.1); color: var(--blue); }
  .notif-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .notif-body { color: var(--text2); font-size: 13px; margin-bottom: 2px; }
  .notif-time { color: #555; font-size: 11px; }
  .notif-view { margin-left: auto; padding: 6px 14px; border-radius: 6px; background: var(--surface3); color: var(--accent); font-size: 11px; font-weight: 700; border: 1px solid var(--border); }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 14px 20px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); border-bottom: 1px solid var(--border); background: var(--surface2); }
  td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.ok { background: var(--accent); }
  .status-dot.fail { background: var(--danger); }
  .status-dot.warn { background: var(--warn); }

  .modal-back { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    width: 90%; max-width: 440px; max-height: 90vh; overflow: auto; padding: 24px;
  }
  .modal.wide { max-width: 700px; }
  .modal h3 { font-size: 18px; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* Payment Detail Modal */
  .detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .detail-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .detail-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 4px; }
  .detail-stat-value { font-size: 18px; font-weight: 700; }
  .detail-stat-value.green { color: var(--accent); }
  .detail-stat-value.red { color: var(--danger); }
  .detail-stat-value.blue { color: var(--blue); }
  .detail-section { margin-bottom: 20px; }
  .detail-section h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 10px; }
  .charge-table { font-size: 12px; }
  .charge-table th { padding: 8px 12px; }
  .charge-table td { padding: 8px 12px; }

  /* Metrics */
  .metrics-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
  .metrics-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .chart-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
  }
  .chart-card h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); margin-bottom: 16px; }
  .chart-wrap { height: 240px; position: relative; }

  /* Admin */
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .admin-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px;
  }

  .plan-badge {
    display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; text-transform: uppercase;
  }
  .plan-free { background: rgba(136,136,136,0.1); color: var(--text2); }
  .plan-standard { background: rgba(0,255,136,0.1); color: var(--accent); }
  .plan-pro { background: rgba(170,102,255,0.1); color: var(--purple); }

  @media (max-width: 1100px) {
    .kanban { grid-template-columns: repeat(2, 1fr); }
    .settings-grid { grid-template-columns: 1fr; }
    .metrics-grid { grid-template-columns: 1fr; }
    .metrics-grid-2 { grid-template-columns: 1fr; }
  }
  @media (max-width: 700px) {
    .kanban { grid-template-columns: 1fr; }
    .nav { padding: 0 16px; overflow-x: auto; }
    .page { padding: 16px; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .detail-stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useCallback, useRef } = React;
const e = React.createElement;

const API = window.location.origin.includes('localhost') ? 'http://localhost:3000' : window.location.origin;

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}, ${d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
}

function api(path, opts) {
  const token = localStorage.getItem('paypulse_token');
  return fetch(API + path, {
    ...opts,
    headers: {
      ...(opts?.headers || {}),
      ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
      'Content-Type': 'application/json'
    }
  }).then(async r => {
    if (r.status === 401 && token) { localStorage.removeItem('paypulse_token'); window.location.reload(); }
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || 'Request failed');
    return data;
  }).catch(err => {
    if (err.message === 'Failed to fetch') throw new Error('Server unreachable — check your connection');
    throw err;
  });
}

// ─── AUTH PAGE ────────────────────────────────────────────────────
function AuthPage({ onAuth }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setError(''); setLoading(true);
    try {
      const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
      localStorage.setItem('paypulse_token', res.token);
      onAuth();
    } catch (err) { setError(err.message); }
    setLoading(false);
  };

  const handleKeyDown = (ev) => { if (ev.key === 'Enter' && !loading) submit(); };

  return e('div', { className: 'auth-wrap' },
    e('div', { className: 'auth-box' },
      e('div', { className: 'auth-logo' },
        e('div', { className: 'auth-logo-icon' }, '⚡'),
        e('span', { className: 'auth-logo-text' }, 'PAYPULSE')
      ),
      e('div', { className: 'auth-subtitle', style: { color: 'var(--text2)', fontSize: 14, marginBottom: 28, textAlign: 'center' } },
        'Pay-Per-Appointment Billing for SMMAs'
      ),
      error && e('div', { className: 'error-msg', style: { marginBottom: 12 } }, error),
      e('div', { className: 'form-group' },
        e('label', null, 'Email'),
        e('input', { type: 'email', placeholder: 'you@company.com', value: email, onChange: ev => setEmail(ev.target.value), onKeyDown: handleKeyDown })
      ),
      e('div', { className: 'form-group' },
        e('label', null, 'Password'),
        e('input', { type: 'password', placeholder: '••••••••', value: password, onChange: ev => setPassword(ev.target.value), onKeyDown: handleKeyDown })
      ),
      e('button', { className: 'btn-primary', onClick: submit, disabled: loading, style: { marginTop: 8 } },
        loading ? 'Signing in...' : 'Log In'
      ),
      e('div', { style: { textAlign:'center', marginTop:20, color:'var(--text2)', fontSize:12 } },
        'Accounts are created by your administrator.'
      )
    )
  );
}

// ─── CUSTOMER CARD ──────────────────────────────────────────────
function CustomerCard({ customer, onCharge, onEdit, onAnalytics, webhookSecret, onSaveCard }) {
  const locId = customer.ghl_location_id;
  const clientWebhook = locId && webhookSecret ? (window.location.origin + '/webhook/ghl/' + webhookSecret + '/' + locId) : null;
  const [copied, setCopied] = useState(false);
  const [savingCard, setSavingCard] = useState(false);
  const copyUrl = () => { navigator.clipboard.writeText(clientWebhook); setCopied(true); setTimeout(() => setCopied(false), 2000); };

  const saveCard = async () => {
    setSavingCard(true);
    try {
      const data = await api('/api/customers/' + customer.id + '/setup-card', { method: 'POST' });
      window.location.href = data.url;
    } catch (err) {
      alert('Failed to create card setup link: ' + err.message);
      setSavingCard(false);
    }
  };

  return e('div', { className: 'cust-card' },
    e('div', { className: 'cust-name' }, customer.name),
    e('div', { className: 'cust-rate' }, '$' + customer.rate_per_trigger + '/appt'),
    customer.company_name && e('div', { className: 'cust-company', style: { fontSize: 12, color: 'var(--text2)', marginTop: 2 } }, customer.company_name),
    e('div', { className: 'cust-email' }, customer.email),
    locId && e('div', { style: { fontSize: 11, color: 'var(--blue)', marginTop: 4, display: 'flex', alignItems: 'center', gap: 6 } },
      '📍 Location: ', e('span', { style: { fontFamily: 'monospace', color: 'var(--text)' } }, locId.slice(0, 12) + (locId.length > 12 ? '…' : ''))
    ),
    clientWebhook && e('div', { style: { marginTop: 6, padding: '6px 8px', background: 'var(--surface2)', borderRadius: 6, fontSize: 11, display: 'flex', alignItems: 'center', gap: 6 } },
      e('span', { style: { color: 'var(--blue)', fontWeight: 600 } }, '🔗 Webhook:'),
      e('span', { style: { fontFamily: 'monospace', color: 'var(--text)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 } }, clientWebhook),
      e('button', { onClick: copyUrl, style: { background: copied ? 'var(--accent)' : 'var(--surface3)', color: copied ? '#000' : 'var(--text2)', border: 'none', borderRadius: 4, padding: '2px 8px', fontSize: 10, fontWeight: 700, cursor: 'pointer', flexShrink: 0 } }, copied ? '✓' : 'Copy')
    ),
    e('div', { className: 'cust-meta' },
      customer.card_on_file
        ? e('span', { className: 'tag tag-green' }, '\\u2713 Card on file')
        : e('span', { className: 'tag tag-red' }, 'No card')
    ),
    e('div', { className: 'cust-actions' },
      e('button', { className: 'btn-sm green', onClick: () => onCharge(customer) }, 'Charge'),
      e('button', { className: 'btn-sm', onClick: () => onEdit(customer) }, 'Edit'),
      e('button', { className: 'btn-sm purple', onClick: () => onAnalytics(customer) }, 'Analytics'),
      e('button', { className: 'btn-sm', style: { background: 'rgba(68,136,255,0.1)', color: 'var(--blue)', borderColor: 'rgba(68,136,255,0.3)' }, onClick: saveCard, disabled: savingCard }, savingCard ? '...' : 'Save Card')
    )
  );
}

// ─── PAYMENT DETAIL MODAL ────────────────────────────────────────
function PaymentDetailModal({ customer, onClose, onRefresh }) {
  const [details, setDetails] = useState(null);
  const [loading, setLoading] = useState(true);
  const [savingRate, setSavingRate] = useState(false);
  const [newRate, setNewRate] = useState(customer.rate_per_trigger);
  const [note, setNote] = useState('');
  const [retrying, setRetrying] = useState(null);
  const [savingCard, setSavingCard] = useState(false);

  useEffect(() => {
    api('/api/customers/' + customer.id + '/payment-details')
      .then(setDetails)
      .catch(err => alert('Failed to load details: ' + err.message))
      .finally(() => setLoading(false));
  }, [customer.id]);

  const saveRate = async () => {
    setSavingRate(true);
    await api('/api/customers/' + customer.id, { method: 'PATCH', body: JSON.stringify({ rate_per_trigger: parseFloat(newRate) || 147 }) });
    setSavingRate(false);
    onRefresh();
    const updated = await api('/api/customers/' + customer.id + '/payment-details');
    setDetails(updated);
  };

  const fireCharge = async () => {
    if (!confirm(`Charge $${customer.rate_per_trigger} for ${customer.name}?`)) return;
    try {
      const res = await api('/api/customers/' + customer.id + '/charge', { method: 'POST', body: JSON.stringify({ note }) });
      alert(res.status === 'succeeded' ? `✓ Charge succeeded! (ID: ${res.id.slice(-8)})` : `✗ Charge failed: ${res.failure_reason}`);
      onRefresh();
      const updated = await api('/api/customers/' + customer.id + '/payment-details');
      setDetails(updated);
      setNote('');
    } catch (err) { alert('Charge failed: ' + err.message); }
  };

  const saveCard = async () => {
    setSavingCard(true);
    try {
      const data = await api('/api/customers/' + customer.id + '/setup-card', { method: 'POST' });
      window.location.href = data.url;
    } catch (err) {
      alert('Failed to create card setup link: ' + err.message);
      setSavingCard(false);
    }
  };

  const retryCharge = async (chargeId) => {
    setRetrying(chargeId);
    try {
      const res = await api('/api/charges/' + chargeId + '/retry', { method: 'POST' });
      alert(res.status === 'succeeded' ? `✓ Retry succeeded! (ID: ${res.id.slice(-8)})` : `✗ Retry failed: ${res.failure_reason}`);
      onRefresh();
      const updated = await api('/api/customers/' + customer.id + '/payment-details');
      setDetails(updated);
    } catch (err) { alert('Retry failed: ' + err.message); }
    setRetrying(null);
  };

  if (loading) return e('div', { className: 'modal-back', onClick: onClose },
    e('div', { className: 'modal wide' }, e('h3', null, 'Loading...'))
  );

  const d = details || { charges: [], totalCharged: 0, totalTriggers: 0, creditBalance: 0, failureCount: 0, chargebackCount: 0, ratePerTrigger: customer.rate_per_trigger, cardOnFile: false };
  const c = d.customer || customer;

  return e('div', { className: 'modal-back', onClick: ev => ev.target === ev.currentTarget && onClose() },
    e('div', { className: 'modal wide' },
      e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 16 } },
        e('div', null,
          e('h3', { style: { marginBottom: 4 } }, c.name),
          e('div', { style: { color: 'var(--text2)', fontSize: 13 } }, c.email)
        ),
        e('button', { onClick: onClose, style: { fontSize: 20, padding: '4px 8px', color: 'var(--text2)' } }, '✕')
      ),

      e('div', { className: 'detail-stats' },
        e('div', { className: 'detail-stat' },
          e('div', { className: 'detail-stat-label' }, 'Total Charged'),
          e('div', { className: 'detail-stat-value green' }, '$' + (d.totalCharged || 0).toFixed(2))
        ),
        e('div', { className: 'detail-stat' },
          e('div', { className: 'detail-stat-label' }, 'Total Triggers'),
          e('div', { className: 'detail-stat-value blue' }, d.totalTriggers || 0)
        ),
        e('div', { className: 'detail-stat' },
          e('div', { className: 'detail-stat-label' }, 'Credit Balance'),
          e('div', { className: 'detail-stat-value ' + ((d.creditBalance || 0) > 0 ? 'green' : '') }, '$' + (d.creditBalance || 0).toFixed(2))
        ),
        e('div', { className: 'detail-stat' },
          e('div', { className: 'detail-stat-label' }, 'Last Charge'),
          e('div', { className: 'detail-stat-value', style: { fontSize: 14 } }, fmtDate(d.lastChargeDate))
        ),
        e('div', { className: 'detail-stat' },
          e('div', { className: 'detail-stat-label' }, 'Failed / Chargebacks'),
          e('div', { className: 'detail-stat-value ' + ((d.failureCount + d.chargebackCount) > 0 ? 'red' : '') },
            (d.failureCount || 0) + ' / ' + (d.chargebackCount || 0)
          )
        ),
        e('div', { className: 'detail-stat' },
          e('div', { className: 'detail-stat-label' }, 'Card on File'),
          e('div', { className: 'detail-stat-value ' + (d.cardOnFile ? 'green' : 'red'), style: { fontSize: 14 } },
            d.cardOnFile ? '✓ Yes' : '✗ No'
          )
        )
      ),

      !d.cardOnFile && e('div', { className: 'detail-section' },
        e('h4', null, 'Card Setup'),
        e('div', { style: { display: 'flex', gap: 10, alignItems: 'center' } },
          e('span', { style: { color: 'var(--text2)', fontSize: 13, flex: 1 } }, 'No card on file. Generate a Stripe Checkout link to save the client\'s card ($1 auth charge).'),
          e('button', { className: 'btn-sm', style: { background: 'rgba(68,136,255,0.1)', color: 'var(--blue)', borderColor: 'rgba(68,136,255,0.3)', padding: '8px 16px' }, onClick: saveCard, disabled: savingCard }, savingCard ? '...' : 'Save Card')
        )
      ),

      e('div', { className: 'detail-section' },
        e('h4', null, 'Rate per Appointment'),
        e('div', { style: { display: 'flex', gap: 10, alignItems: 'center' } },
          e('input', { type: 'number', value: newRate, onChange: ev => setNewRate(ev.target.value), style: { width: 120 } }),
          e('button', { className: 'btn-sm green', onClick: saveRate, disabled: savingRate }, savingRate ? '...' : 'Save'),
          d.cardOnFile
            ? e('span', { className: 'tag tag-green' }, 'Card on file')
            : e('span', { className: 'tag tag-red' }, 'No card on file')
        )
      ),

      e('div', { className: 'detail-section' },
        e('h4', null, 'GHL & Webhook Info'),
        e('div', { style: { fontSize: 13, color: 'var(--text2)' } },
          'Location ID: ', e('strong', { style: { color: 'var(--text)' } }, d.ghlLocationId || '—')
        ),
        d.webhookUrl && e('div', { style: { marginTop: 6, padding: '8px 12px', background: 'var(--surface2)', borderRadius: 6, fontFamily: 'monospace', fontSize: 11, color: 'var(--blue)', wordBreak: 'break-all' } },
          d.webhookUrl
        ),
        !d.webhookUrl && e('div', { style: { fontSize: 12, color: 'var(--text2)', marginTop: 6 } }, 'Set a GHL Location ID to get a per-client webhook URL')
      ),

      e('div', { className: 'detail-section' },
        e('h4', null, 'Charge History (Last ' + Math.min(d.charges.length, 10) + ' of ' + d.charges.length + ')'),
        e('div', { className: 'table-wrap', style: { maxHeight: 250, overflow: 'auto' } },
          e('table', { className: 'charge-table' },
            e('thead', null, e('tr', null,
              e('th', null, 'Status'), e('th', null, 'Amount'), e('th', null, 'Note'), e('th', null, 'Date'), e('th', null, 'Action')
            )),
            e('tbody', null,
              d.charges.slice(0, 10).map(ch =>
                e('tr', { key: ch.id },
                  e('td', null,
                    e('span', { className: 'status-dot ' + (ch.status==='succeeded'?'ok':ch.status==='failed'?'fail':'warn') }),
                    e('span', { style: { textTransform:'capitalize' } }, ch.status)
                  ),
                  e('td', null, '$' + ch.amount.toFixed(2)),
                  e('td', { style: { color: 'var(--text2)' } }, ch.note || '—'),
                  e('td', { style: { color: 'var(--text2)' } }, fmtDate(ch.created_at)),
                  e('td', null,
                    ch.status === 'failed'
                      ? e('button', { className: 'btn-sm', style: { padding: '4px 10px', fontSize: 10 }, onClick: () => retryCharge(ch.id), disabled: retrying === ch.id }, retrying === ch.id ? '...' : 'Retry')
                      : ''
                  )
                )
              ),
              d.charges.length === 0 && e('tr', null, e('td', { colSpan: 5, style: { textAlign:'center', color:'#555', padding:20 } }, 'No charges yet'))
            )
          )
        )
      ),

      e('div', { className: 'detail-section' },

        e('div', { style: { display: 'flex', gap: 10, alignItems: 'center' } },

          e('button', { className: 'btn-primary', onClick: fireCharge, style: { width: 'auto' } }, 'Charge $' + c.rate_per_trigger)
        )
      ),

      e('div', { className: 'modal-actions' },

      )
    )
  );
}

// ─── CUSTOMERS PAGE ───────────────────────────────────────────────
function CustomersPage({ customers, onRefresh, settings }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [chargeModal, setChargeModal] = useState(null);
  const [editModal, setEditModal] = useState(null);
  const [detailModal, setDetailModal] = useState(null);
  const [note, setNote] = useState('');

  const processors = { all: 'All', whop: 'Whop', stripe: 'Stripe' };

  const filtered = customers.filter(c => {
    if (filter !== 'all' && filter !== c.processor) return false;
    if (search && !c.name.toLowerCase().includes(search.toLowerCase()) && !c.email.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const byStatus = { new: [], active: [], at_risk: [], paused: [] };
  filtered.forEach(c => {
    const s = byStatus[c.status] ? c.status : 'new';
    byStatus[s].push(c);
  });

  const doCharge = async () => {
    await api('/api/customers/' + chargeModal.id + '/charge', { method: 'POST', body: JSON.stringify({ note }) });
    setChargeModal(null); setNote(''); onRefresh();
  };

  const doEdit = async () => {
    if (editModal.id === 'new') {
      await api('/api/customers', { method: 'POST', body: JSON.stringify({ ...editModal, user_id: req.user.id }) });
    } else {
      await api('/api/customers/' + editModal.id, { method: 'PATCH', body: JSON.stringify({ rate_per_trigger: editModal.rate_per_trigger, status: editModal.status, name: editModal.name, company_name: editModal.company_name, ghl_location_id: editModal.ghl_location_id, stripe_customer_id: editModal.stripe_customer_id || '', stripe_payment_method_id: editModal.stripe_payment_method_id || '' }) });
    }
    setEditModal(null); onRefresh();

  const colConfig = [
    { key: 'new', label: 'New', color: '#4488ff' },

      e('div', { className: 'stat-card' },

      e('div', { className: 'nav-spacer' }),
      e('button', { className: 'btn-primary', style: { padding:'8px 18px', fontSize:13 }, onClick: () => setEditModal({ id: 'new', name: '', email: '', rate_per_trigger: 147, status: 'new', ghl_location_id: '' }) }, '+ Add Customer'),
      e('button', { className: 'btn-sm', style: { padding:'8px 16px' }, onClick: onRefresh }, '↻ Sync'),

    e('div', { className: 'filters', style: { marginBottom:24 } },

// ─── INBOX PAGE ─────────────────────────────────────────────────
function InboxPage({ notifications, onRefresh }) {

    if (type === 'success') return e('div', { className: 'notif-icon success', style }, '\u2713');
    if (type === 'fail') return e('div', { className: 'notif-icon fail', style }, '\u26A0');

    return e('div', { className: 'notif-icon new', style }, '\u25C6');

  return e('div', { className: 'page' },

      e('div', { className: 'notif-header' },
        e('h3', null, e('span', { style: { color:'var(--accent)' } }, 'Notifications'), ' Inbox'),

// ─── METRICS PAGE ────────────────────────────────────────────────
function MetricsPage({ metrics }) {
  const revChartRef = useRef(null);
  const custChartRef = useRef(null);

  useEffect(() => {
    if (!metrics) return;
    const revCtx = revChartRef.current?.getContext('2d');
    const custCtx = custChartRef.current?.getContext('2d');
    if (!revCtx || !custCtx) return;

    Chart.defaults.color = '#888';
    Chart.defaults.borderColor = '#2a2a2a';

    const labels = Object.keys(metrics.revenueByDay).slice(-14);
    const revData = labels.map(k => metrics.revenueByDay[k] || 0);
    const failData = labels.map(k => metrics.failuresByDay[k] || 0);

    const revChart = new Chart(revCtx, {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Revenue ($)', data: revData, borderColor: '#00ff88', backgroundColor: 'rgba(0,255,136,0.1)', fill: true, tension: 0.4, pointRadius: 3 },
        { label: 'Failures', data: failData, borderColor: '#ff4444', backgroundColor: 'rgba(255,68,68,0.05)', fill: true, tension: 0.4, pointRadius: 2 }
      ]},
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#888' } } }, scales: { y: { beginAtZero: true } } }
    });

    const topNames = metrics.topCustomers.map(c => c.name);
    const topVals = metrics.topCustomers.map(c => c.totalCharged);
    const custChart = new Chart(custCtx, {
      type: 'bar',
      data: { labels: topNames, datasets: [{ label: 'Total Charged ($)', data: topVals, backgroundColor: '#4488ff', borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });

    return () => { revChart.destroy(); custChart.destroy(); };
  }, [metrics]);

  if (!metrics) return e('div', { className: 'page' }, e('div', { style: { color:'#555', textAlign:'center', padding:60 } }, 'Loading metrics...'));

  return e('div', { className: 'page' },
    e('div', { className: 'page-title' }, 'Metrics'),
    e('div', { className: 'stats-row' },
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, '30-Day Revenue'),
        e('div', { className: 'stat-value' }, '$' + metrics.totalRevenue.toFixed(0))
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, 'Failure Rate'),
        e('div', { className: 'stat-value ' + (parseFloat(metrics.failureRate) > 10 ? 'red' : '') }, metrics.failureRate + '%')
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, 'Chargebacks'),
        e('div', { className: 'stat-value red' }, metrics.totalChargebacks)
      ),
      e('div', { className: 'stat-card' },
        e('div', { className: 'stat-label' }, 'Total Customers'),
        e('div', { className: 'stat-value blue' }, metrics.totalCustomers)
      )
    ),
    e('div', { className: 'metrics-grid' },
      e('div', { className: 'chart-card' },
        e('h3', null, 'Revenue & Failures (Last 14 Days)'),
        e('div', { className: 'chart-wrap' }, e('canvas', { ref: revChartRef }))
      ),
      e('div', { className: 'chart-card' },
        e('h3', null, 'Top Customers'),
        e('div', { className: 'chart-wrap' }, e('canvas', { ref: custChartRef }))
      )
    )
  );
}

// ─── CREATE AGENCY MODAL ────────────────────────────────────────
function CreateAgencyModal({ onClose, onRefresh }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [companyName, setCompanyName] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const submit = async () => {
    setError(''); setLoading(true);
    try {
      await api('/api/admin/agencies', {
        method: 'POST',
        body: JSON.stringify({ email, password, name, companyName })
      });
      onRefresh();
      onClose();
    } catch (err) { setError(err.message); }
    setLoading(false);
  };

  return e('div', { className: 'modal' },
    e('h3', null, 'Create Agency Account'),
    e('div', { className: 'form-group' },
      e('label', null, 'Email'),
      e('input', { placeholder: 'agency@company.com', value: email, onChange: ev => setEmail(ev.target.value) })
    ),
    e('div', { className: 'form-group' },
      e('label', null, 'Password'),
      e('input', { type: 'password', placeholder: '••••••••', value: password, onChange: ev => setPassword(ev.target.value) })
    ),
    e('div', { className: 'form-group' },
      e('label', null, 'Name'),
      e('input', { placeholder: 'John Smith', value: name, onChange: ev => setName(ev.target.value) })
    ),
    e('div', { className: 'form-group' },
      e('label', null, 'Company Name'),
      e('input', { placeholder: 'SMMA Agency', value: companyName, onChange: ev => setCompanyName(ev.target.value) })
    ),
    error && e('div', { className: 'error-msg' }, error),
    e('div', { className: 'modal-actions' },
      e('button', { className: 'btn-ghost', onClick: onClose }, 'Cancel'),
      e('button', { className: 'btn-primary', onClick: submit, disabled: loading }, loading ? '...' : 'Create Account')
    )
  );
}

                e('button', { className: 'btn-sm', style: { marginRight:6 }, onClick: () => setShowModal(a) }, 'Edit'),

// ─── ADMIN SETTINGS PAGE ────────────────────────────────────────
function AdminSettingsPage({ user, onSave }) {
  const [currentPassword, setCurrentPassword] = useState('');
  const [newPassword, setNewPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [newEmail, setNewEmail] = useState(user?.email || '');
  const [error, setError] = useState('');
  const [saved, setSaved] = useState(false);
  const [loading, setLoading] = useState(false);

  const save = async () => {
    setError(''); setSaved(false);
    if (!currentPassword || !newPassword) { setError('Current password and new password required'); return; }
    if (newPassword !== confirmPassword) { setError('New passwords do not match'); return; }
    if (newPassword.length < 6) { setError('New password must be at least 6 characters'); return; }
    setLoading(true);
    try {
      await api('/api/auth/change-password', {
        method: 'POST',
        body: JSON.stringify({ currentPassword, newPassword, email: newEmail !== user?.email ? newEmail : undefined })
      });
      setSaved(true); setCurrentPassword(''); setNewPassword(''); setConfirmPassword('');
      setTimeout(() => setSaved(false), 3000);
      onSave();
    } catch (err) { setError(err.message); }
    setLoading(false);
  };

  return e('div', { className: 'page' },
    e('div', { className: 'page-title' }, 'Account Settings'),
    e('div', { className: 'settings-grid' },
      e('div', { className: 'settings-card' },
        e('h3', null, 'Change Login Info'),
        e('div', { style: { color: 'var(--text2)', fontSize: 13, marginBottom: 20 } },
          'Update your admin password and email address.'
        ),
        error && e('div', { className: 'error-msg', style: { marginBottom: 12 } }, error),
        saved && e('div', { style: { color: 'var(--accent)', fontSize: 13, marginBottom: 12, fontWeight: 600 } }, '\u2713 Settings saved successfully'),
        e('div', { className: 'form-group' },
          e('label', null, 'Email'),
          e('input', { type: 'email', value: newEmail, onChange: ev => setNewEmail(ev.target.value), placeholder: 'admin@paypulse.co' })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Current Password'),
          e('input', { type: 'password', value: currentPassword, onChange: ev => setCurrentPassword(ev.target.value), placeholder: '••••••••' })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'New Password'),
          e('input', { type: 'password', value: newPassword, onChange: ev => setNewPassword(ev.target.value), placeholder: '••••••••' })
        ),
        e('div', { className: 'form-group' },
          e('label', null, 'Confirm New Password'),
          e('input', { type: 'password', value: confirmPassword, onChange: ev => setConfirmPassword(ev.target.value), placeholder: '••••••••' })
        ),
        e('button', { className: 'btn-primary', onClick: save, disabled: loading },
          loading ? 'Saving...' : 'Save Changes'
        )
      )
    )
  );
}

// ─── APP ──────────────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(localStorage.getItem('paypulse_token'));
  const [user, setUser] = useState(null);
  const [, forceRender] = useState(0);
  // Read page from hash on every render (no state needed for page)
  const page = window.location.hash.replace('#', '') || (user?.role === 'admin' ? 'admin' : 'customers');

  // Listen for hash changes to trigger re-render
  useEffect(() => {
    const onHash = () => forceRender(n => n + 1);
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const [customers, setCustomers] = useState([]);
  const [notifications, setNotifications] = useState([]);
  const [settings, setSettings] = useState(null);
  const [charges, setCharges] = useState([]);
  const [metrics, setMetrics] = useState(null);
  const [unreadCount, setUnreadCount] = useState(0);
  const [agencies, setAgencies] = useState([]);
  const [adminStats, setAdminStats] = useState(null);

  const refresh = useCallback(async () => {
    if (!token) return;
    try {
      const me = await api('/api/auth/me');
      setUser(me);

      if (me.role === 'admin') {
        const [aRes, sRes] = await Promise.all([
          api('/api/admin/agencies'),
          api('/api/admin/stats'),
        ]);
        setAgencies(aRes);
        setAdminStats(sRes);
      } else {
        const [cRes, nRes, sRes, chRes, mRes, uRes] = await Promise.all([
          api('/api/customers'), api('/api/notifications'), api('/api/settings'),
          api('/api/charges'), api('/api/metrics'), api('/api/notifications/unread-count'),
        ]);
        setCustomers(cRes);
        setNotifications(nRes);
        setSettings(sRes);
        setCharges(chRes);
        setMetrics(mRes);
        setUnreadCount(uRes.count);
      }
    } catch (err) { console.error('Refresh failed', err); }
  }, [token]);

  useEffect(() => { if (token) { refresh(); const iv = setInterval(refresh, 5000); return () => clearInterval(iv); } }, [refresh, token]);

  const logout = () => { localStorage.removeItem('paypulse_token'); setToken(null); setUser(null); window.location.reload(); };

  if (!token) return e(AuthPage, { onAuth: () => setToken(localStorage.getItem('paypulse_token')) });

  const isAdmin = user?.role === 'admin';

  const agencyNav = [
    { key: 'customers', label: 'Customers' },
    { key: 'settings', label: 'Settings' },
    { key: 'charges', label: 'Charges' },
    { key: 'metrics', label: 'Metrics' },
  ];

  const adminNav = [
    { key: 'admin', label: 'Agencies' },
    { key: 'admin-settings', label: 'Settings' },
  ];

  const navItems = isAdmin ? adminNav : agencyNav;

  return e('div', null,
    e('nav', { className: 'nav' },
      e('div', { className: 'logo' },
        e('div', { className: 'logo-icon' }, '⚡'),
        e('span', { style: { color: 'var(--accent)' } }, 'PAYPULSE')
      ),
      navItems.map(item =>
        e('div', {
          key: item.key,
          className: 'nav-link ' + (page === item.key ? 'active' : ''),
          onClick: () => { window.location.hash = item.key; }
        }, item.label)
      ),
      e('div', { className: 'nav-spacer' }),
      !isAdmin && e('button', { className: 'inbox-btn', onClick: () => { window.location.hash = 'inbox'; } },
        '\uD83D\uDD14',
        unreadCount > 0 && e('span', { className: 'badge' }, unreadCount)
      ),
      e('div', { className: 'nav-link', style: { opacity: 0.6, cursor: 'default' } }, '\u2B50'),
      e('div', { className: 'nav-link', style: { fontSize: 12, color: user?.subscription?.hasStripe ? 'var(--accent)' : 'var(--text2)' } },
        user?.subscription?.hasStripe ? '\u25CF Pro' : user?.subscription?.plan || 'Free'
      ),
      e('div', { className: 'nav-link', style: { opacity: 0.5, cursor: 'pointer' }, onClick: logout }, 'Sign Out')
    ),
    !isAdmin && page === 'customers' && e(CustomersPage, { customers, onRefresh: refresh, settings }),
    !isAdmin && page === 'settings' && e(SettingsPage, { settings, onSave: refresh }),
    !isAdmin && page === 'inbox' && e(InboxPage, { notifications, onRefresh: refresh }),
    !isAdmin && page === 'charges' && e(ChargesPage, { charges }),
    !isAdmin && page === 'metrics' && e(MetricsPage, { metrics }),
    isAdmin && page === 'admin' && e(AdminPage, { agencies, adminStats, onRefresh: refresh }),
    isAdmin && page === 'admin-settings' && e(AdminSettingsPage, { user, onSave: refresh })
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(e(App));
</script>
